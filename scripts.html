<script>
  'use strict';

  // ======================================================
  //  WORKFLOW PRO — MASTER SCRIPT v4.0
  // ======================================================
  
  /**
   * NOTE: "Unrecognized feature" warnings in the console (ambient-light-sensor, speaker, etc.)
   * are standard for Google Apps Script environments and can be safely ignored.
   * They do NOT affect the functionality of this application.
   */

  /* ── CONSTANTS ── */
  const STATUS_MAP = {
    'Not Started': { action: 'Plan', color: '#64748b', bg: 'rgba(100,116,139,0.15)', css: 'status-not-started' },
    'In Progress': { action: 'Execute', color: '#3b82f6', bg: 'rgba(59,130,246,0.15)', css: 'status-in-progress' },
    'Review': { action: 'Review', color: '#f59e0b', bg: 'rgba(245,158,11,0.15)', css: 'status-review' },
    'On Hold': { action: 'Wait', color: '#8b5cf6', bg: 'rgba(139,92,246,0.15)', css: 'status-on-hold' },
    'Blocked': { action: 'Escalate', color: '#ef4444', bg: 'rgba(239,68,68,0.15)', css: 'status-blocked' },
    'Completed': { action: 'Close', color: '#10b981', bg: 'rgba(16,185,129,0.15)', css: 'status-completed' },
    'Cancelled': { action: 'Cancel', color: '#6b7280', bg: 'rgba(107,114,128,0.15)', css: 'status-cancelled' }
  };

  const PRIORITY_MAP = {
    'Critical': { color: '#dc2626', css: 'priority-critical', order: 0 },
    'High': { color: '#ef4444', css: 'priority-high', order: 1 },
    'Medium': { color: '#f59e0b', css: 'priority-medium', order: 2 },
    'Low': { color: '#10b981', css: 'priority-low', order: 3 }
  };

  const KANBAN_COLS = ['Not Started', 'In Progress', 'Review', 'Blocked', 'Completed'];

  const AVATAR_COLORS = ['#6366f1', '#14b8a6', '#f59e0b', '#ef4444', '#8b5cf6', '#3b82f6', '#10b981', '#ec4899'];

  /* ── STATE ── */
  const State = {
    user: null, // Stores { username, role, email }
    tasks: [],
    employees: [],
    stats: {},
    chartData: {},
    activeView: 'dashboard',
    activeSubView: 'employee',
    chartInstances: [],
    isLoading: false
  };

  /* ── SERVER BRIDGE ── */
  function callServer(method, p1, p2) {
    const userEmail = State.user ? State.user.email : '';
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(res => {
          if (res && res.success) resolve(res.data);
          else reject(new Error(res ? res.error : 'Unknown error'));
        })
        .withFailureHandler(err => reject(err))
        .api(method, p1, p2, userEmail);
    });
  }

  /* ── HELPERS ── */
  function formatDate(raw) {
    if (!raw) return '—';
    try {
      const d = new Date(raw);
      if (isNaN(d.getTime())) return '—';
      return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch { return '—'; }
  }

  function formatISO(raw) {
    if (!raw) return '';
    try {
      const d = new Date(raw);
      if (isNaN(d.getTime())) return '';
      return d.toISOString().split('T')[0];
    } catch { return ''; }
  }

  function getInitials(name) {
    if (!name) return '??';
    return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
  }

  function getAvatarColor(name) {
    if (!name) return AVATAR_COLORS[0];
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
  }

  function statusBadge(status) {
    const s = STATUS_MAP[status] || STATUS_MAP['Not Started'];
    return `<span class="badge ${s.css}">${status || '—'}</span>`;
  }

  function priorityBadge(priority) {
    const p = PRIORITY_MAP[priority];
    if (!p) return `<span class="badge">${priority || '—'}</span>`;
    return `<span class="badge ${p.css}">${priority}</span>`;
  }

  function progressBar(pct, color) {
    const val = Math.min(100, Math.max(0, parseFloat(pct) || 0));
    const col = color || (val >= 80 ? '#10b981' : val >= 50 ? '#f59e0b' : '#3b82f6');
    return `
    <div style="display:flex; align-items:center; gap:0.5rem;">
      <div class="progress-bar" style="flex:1; width:80px;">
        <div class="progress-fill" style="width:${val}%; background:${col};"></div>
      </div>
      <span class="text-xs text-muted">${val}%</span>
    </div>`;
  }

  function roundNum(n) { return Math.round((parseFloat(n) || 0) * 10) / 10; }

  /* ── DATA LOADING ── */
  async function refreshData() {
    try {
      const [tasks, employees, stats, chartData] = await Promise.all([
        callServer('getRecords', 'DB_Tasks'),
        callServer('getRecords', 'DB_Employees'),
        callServer('getDashboardStats'),
        callServer('getChartData')
      ]);
      State.tasks = tasks || [];
      State.employees = employees || [];
      State.stats = stats || {};
      State.chartData = chartData || {};
    } catch (err) {
      console.error('Data load error:', err);
      throw err;
    }
  }

  /* ── INIT ── */
  async function init() {
    console.log('%c App Init: Starting Workflow Pro Auth Check ', 'background: #6366f1; color: #fff; padding: 2px 5px; border-radius: 3px;');
    
    // Check Session
    const session = localStorage.getItem('wf-session');
    
    if (session) {
      try {
        console.log('Session: Found existing session. Validating...');
        State.user = JSON.parse(session);
        await proceedToDashboard();
      } catch (e) {
        console.warn('Session: Invalid or corrupted session. Clearing.');
        localStorage.removeItem('wf-session');
        showAuthScreen();
      }
    } else {
      console.log('Session: No session found. Showing Login screen.');
      showAuthScreen();
    }

    // Apply saved theme
    const savedTheme = localStorage.getItem('wf-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateThemeIcon(savedTheme);
  }

  function showAuthScreen() {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('content').innerHTML = ''; // Clear
  }

  /* ── ROUTER ── */
  function setView(view) {
    State.activeView = view;
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    const navBtn = document.getElementById(`nav-${view}`);
    if (navBtn) navBtn.classList.add('active');

    // Close mobile sidebar
    document.getElementById('sidebar').classList.remove('open');

    destroyCharts();

    if (view === 'dashboard') renderDashboard();
    if (view === 'kanban') renderKanban();
    if (view === 'reports') renderReports();
    if (view === 'employees') renderEmployees();
  }

  /* ── DESTROY ALL CHARTS ── */
  function destroyCharts() {
    State.chartInstances.forEach(c => { try { c.destroy(); } catch (e) { } });
    State.chartInstances = [];
  }

  /* ── CHART DEFAULTS ── */
  function chartDefaults() {
    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    Chart.defaults.color = isDark ? '#7b8db8' : '#64748b';
    Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
    Chart.defaults.font.size = 12;
    Chart.defaults.borderColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)';
  }

  function safeChart(id, config) {
    const el = document.getElementById(id);
    if (!el) return;
    try {
      chartDefaults();
      const instance = new Chart(el.getContext('2d'), config);
      State.chartInstances.push(instance);
    } catch (e) { console.warn('Chart error', id, e); }
  }

  // ======================================================
  //  DASHBOARD VIEW
  // ======================================================
  function renderDashboard() {
    const main = document.getElementById('content');
    const s = State.stats;
    const openTasks = (s.total || 0) - (s.completed || 0);
    const hrsVar = roundNum((s.estTotalHours || 0) - (s.actualTotalHours || 0));

    // 12-month trend
    const monthMap = {};
    const now = new Date();
    for (let i = 0; i < 12; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - 11 + i, 1);
      const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      monthMap[k] = { due: 0, comp: 0, actHrs: 0 };
    }
    State.tasks.forEach(t => {
      if (!t.DueDate) return;
      const d = new Date(t.DueDate);
      const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      if (monthMap[k]) {
        monthMap[k].due++;
        if (t.Status === 'Completed') monthMap[k].comp++;
      }
    });

    // Status counts including On Hold & Cancelled
    const stsOrder = ['Not Started', 'In Progress', 'Review', 'On Hold', 'Blocked', 'Completed', 'Cancelled'];
    const stsCount = {};
    stsOrder.forEach(s => stsCount[s] = 0);
    State.tasks.forEach(t => { if (stsCount[t.Status] !== undefined) stsCount[t.Status]++; });

    // Employee workload
    const empWork = {};
    State.employees.forEach(e => empWork[e.Name] = { tasks: 0, overdue: 0, comp: 0 });
    State.tasks.forEach(t => {
      if (empWork[t.AssignedTo]) {
        empWork[t.AssignedTo].tasks++;
        const isOverdue = t.Status !== 'Completed' && t.Status !== 'Cancelled' && t.DueDate && new Date(t.DueDate) < now;
        if (isOverdue) empWork[t.AssignedTo].overdue++;
        if (t.Status === 'Completed') empWork[t.AssignedTo].comp++;
      }
    });

    const kpiCards = [
      { label: 'Total Tasks', value: s.total || 0, sub: 'All tracked tasks', color: '#6366f1', icon: '📋' },
      { label: 'Open Tasks', value: openTasks, sub: `${s.completionRate || 0}% complete`, color: '#3b82f6', icon: '🔄' },
      { label: 'Completed', value: s.completed || 0, sub: 'Successfully delivered', color: '#10b981', icon: '✅' },
      { label: 'Overdue', value: s.overdue || 0, sub: 'Need immediate attention', color: '#ef4444', icon: '⚠️' }
    ];

    const monthKeys = Object.keys(monthMap).sort();

    main.innerHTML = `
    <div class="page-header">
      <div class="page-title-group">
        <h1>Dashboard</h1>
        <p>Project delivery overview — all teams, all time</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-secondary btn-sm" onclick="refreshData().then(renderDashboard)">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Refresh
        </button>
        <button class="btn btn-primary btn-sm" onclick="openModal()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Task
        </button>
      </div>
    </div>

    <!-- 8 KPI Cards -->
    <div class="kpi-grid">
      ${kpiCards.map(k => `
        <div class="kpi-card">
          <div class="kpi-icon" style="background:${k.color}1a; border:1px solid ${k.color}30;">
            <span style="font-size:1.1rem">${k.icon}</span>
          </div>
          <div class="kpi-label">${k.label}</div>
          <div class="kpi-value" style="color:${k.color}">${k.value}</div>
          <div class="kpi-sub">${k.sub}</div>
        </div>
      `).join('')}
    </div>

    <!-- Charts Row -->
    <div class="charts-grid" style="grid-template-columns: 2fr 1fr;">
      <div class="chart-card">
        <div class="chart-title">12-Month Productivity Trend</div>
        <div class="chart-subtitle">Tasks due vs completed monthly</div>
        <div class="chart-canvas-wrap"><canvas id="dashTrendChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Status Distribution</div>
        <div class="chart-subtitle">Current task breakdown</div>
        <div class="chart-canvas-wrap"><canvas id="dashStatusChart"></canvas></div>
      </div>
    </div>

    <!-- Dashboard Bottom Tables -->
    <div class="triple-grid">
      <!-- 12-Month Data Table -->
      <div class="table-card">
        <div class="section-card-header">
          <div>
            <div class="section-title">📅 12-Month Trend</div>
          </div>
        </div>
        <div class="data-table-wrap">
          <table>
            <thead><tr><th>Month</th><th>Due</th><th>Done</th></tr></thead>
            <tbody>
              ${monthKeys.map(k => `<tr>
                <td class="cell-primary cell-mono">${k}</td>
                <td>${monthMap[k].due}</td>
                <td><span style="color:${monthMap[k].comp > 0 ? 'var(--success)' : 'var(--text-muted)'};">${monthMap[k].comp}</span></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- Status Summary -->
      <div class="table-card">
        <div class="section-card-header">
          <div class="section-title">📊 Status Summary</div>
        </div>
        <div class="data-table-wrap">
          <table>
            <thead><tr><th>Status</th><th>Action</th><th>Count</th></tr></thead>
            <tbody>
              ${stsOrder.map(k => `<tr>
                <td>${statusBadge(k)}</td>
                <td class="text-xs text-muted">${STATUS_MAP[k]?.action || '—'}</td>
                <td class="cell-primary">${stsCount[k]}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- Employee Workload -->
      <div class="table-card">
        <div class="section-card-header">
          <div class="section-title">👥 Employee Workload</div>
        </div>
        <div class="data-table-wrap">
          <table>
            <thead><tr><th>Employee</th><th>Tasks</th><th>Done</th><th>⚠️</th></tr></thead>
            <tbody>
              ${Object.keys(empWork).map(n => `<tr>
                <td>
                  <div style="display:flex;align-items:center;gap:0.5rem;">
                    <div style="width:26px;height:26px;border-radius:50%;background:${getAvatarColor(n)};display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;color:white;flex-shrink:0;">${getInitials(n)}</div>
                    <span class="cell-primary" style="font-size:0.8rem;">${n}</span>
                  </div>
                </td>
                <td>${empWork[n].tasks}</td>
                <td>${empWork[n].comp}</td>
                <td><span style="color:${empWork[n].overdue > 0 ? 'var(--danger)' : 'var(--text-muted)'};">${empWork[n].overdue}</span></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

    // Draw charts after render
    setTimeout(() => {
      const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
      const gridColor = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)';

      safeChart('dashTrendChart', {
        type: 'line',
        data: {
          labels: monthKeys,
          datasets: [
            {
              label: 'Tasks Due', data: monthKeys.map(k => monthMap[k].due),
              borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,0.12)',
              fill: true, tension: 0.4, pointRadius: 4, pointHoverRadius: 6
            },
            {
              label: 'Completed', data: monthKeys.map(k => monthMap[k].comp),
              borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.08)',
              fill: true, tension: 0.4, pointRadius: 4, pointHoverRadius: 6
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'top' } },
          scales: { x: { grid: { color: gridColor } }, y: { beginAtZero: true, grid: { color: gridColor } } }
        }
      });

      safeChart('dashStatusChart', {
        type: 'doughnut',
        data: {
          labels: stsOrder.filter(k => stsCount[k] > 0),
          datasets: [{
            data: stsOrder.filter(k => stsCount[k] > 0).map(k => stsCount[k]),
            backgroundColor: stsOrder.filter(k => stsCount[k] > 0).map(k => STATUS_MAP[k]?.color || '#64748b'),
            borderWidth: 2, borderColor: isDark ? '#0d1420' : '#f8fafc', hoverOffset: 6
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '65%',
          plugins: { legend: { position: 'bottom', labels: { padding: 12, usePointStyle: true } } }
        }
      });
    }, 60);
  }

  // ======================================================
  //  KANBAN BOARD VIEW
  // ======================================================
  function renderKanban() {
    const main = document.getElementById('content');
    const filterText = (document.getElementById('k-search')?.value || '').toLowerCase();
    const filterPrio = document.getElementById('k-prio-filter')?.value || 'All';

    const grouped = {};
    KANBAN_COLS.forEach(c => grouped[c] = []);
    State.tasks.forEach(t => {
      const matchText = !filterText ||
        (t.Title || '').toLowerCase().includes(filterText) ||
        (t.AssignedTo || '').toLowerCase().includes(filterText) ||
        (t.TaskID || '').toLowerCase().includes(filterText);
      const matchPrio = filterPrio === 'All' || t.Priority === filterPrio;
      if (!matchText || !matchPrio) return;

      if (grouped[t.Status]) grouped[t.Status].push(t);
      else grouped['Not Started'].push(t);
    });

    // Build team avatar stack from distinct assignees (up to 6)
    const assignees = [...new Set(State.tasks.map(t => t.AssignedTo).filter(Boolean))].slice(0, 6);
    const avatarStack = assignees.map(name => `
    <div class="k-avatar" title="${name}"
         style="background:${getAvatarColor(name)}"
         onclick="document.getElementById('k-search').value='${name}'; renderKanban();">
      ${getInitials(name)}
    </div>`).join('');

    // Priority icon class helper
    function priorityIconClass(p) {
      if (p === 'Critical') return 'kp-critical';
      if (p === 'High') return 'kp-high';
      if (p === 'Medium') return 'kp-medium';
      return 'kp-low';
    }

    const cols = KANBAN_COLS.map(col => {
      const colTotal = State.tasks.filter(t => t.Status === col).length;
      const cards = grouped[col].map(t => `
      <div class="kanban-card" draggable="true" id="card-${t.TaskID}"
           ondragstart="handleDragStart(event,'${t.TaskID}')"
           title="Drag to move column">
        ${(t.Status !== 'Completed' && t.Status !== 'Cancelled' && t.DueDate && new Date(t.DueDate) < new Date()) ? '<div class="kanban-overdue-dot"></div>' : ''}
        <div class="kanban-card-title" onclick="openModal('${t.TaskID}')">${t.Title || 'Untitled Task'}</div>
        <div style="font-size: 0.75rem; color: var(--text-muted); margin: 0.5rem 0; line-height: 1.3;">
          ${t.Description ? t.Description.substring(0, 60) + (t.Description.length > 60 ? '...' : '') : '<em style="opacity: 0.5;">No description</em>'}
        </div>
        <div class="kanban-card-footer">
          <div class="kanban-card-id-row">
            <svg class="kanban-card-bookmark" width="11" height="13" viewBox="0 0 10 13" fill="currentColor">
              <path d="M0 0h10v13l-5-3-5 3V0z"/>
            </svg>
            <span class="kanban-card-id">${t.TaskID}</span>
          </div>
          <div class="kanban-card-actions">
            <button class="kanban-card-menu" onclick="event.stopPropagation(); openModal('${t.TaskID}')" title="Options">···</button>
            <div class="kanban-priority-lines ${priorityIconClass(t.Priority || 'Medium')}" title="Priority: ${t.Priority || 'Medium'}">
              <span></span><span></span><span></span>
            </div>
            <div class="kanban-card-avatar" style="background:${getAvatarColor(t.AssignedTo || 'Unassigned')}" title="${t.AssignedTo || 'Unassigned'}">
              ${getInitials(t.AssignedTo || 'U')}
            </div>
          </div>
        </div>
      </div>`).join('');

      return `
      <div class="kanban-col" data-status="${col}"
           ondragover="allowDrop(event)" ondrop="handleDrop(event)" ondragleave="handleDragLeave(event)">
        <div class="kanban-col-header">
          <div class="kanban-col-title">
            <div style="width:8px;height:8px;border-radius:50%;background:${STATUS_MAP[col]?.color || '#64748b'};flex-shrink:0;"></div>
            ${col.toUpperCase()}
          </div>
          <span class="kanban-col-count-badge">${grouped[col].length} OF ${colTotal}</span>
        </div>
        <div class="kanban-col-body">${cards || '<div class="kanban-empty-col">Drop tasks here</div>'}</div>
      </div>`;
    }).join('');

    main.innerHTML = `
    <div class="page-header">
      <div class="page-title-group">
        <h1>Kanban Board</h1>
        <p>Drag cards between columns to update status</p>
      </div>
    </div>
    <div class="kanban-toolbar">
      <div class="kanban-toolbar-left">
        <div class="kanban-search-wrap">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="k-search" class="kanban-search" placeholder="Search board"
                 value="${filterText}" onkeyup="renderKanban()">
        </div>
        <div class="kanban-avatar-stack">${avatarStack}</div>
      </div>
      <div class="kanban-toolbar-right">
        <select id="k-prio-filter" class="input-glass" onchange="renderKanban()" style="font-size:0.8rem;padding:0.4rem 0.75rem;">
          <option value="All">All Priorities</option>
          ${Object.keys(PRIORITY_MAP).map(p => `<option value="${p}" ${filterPrio === p ? 'selected' : ''}>${p}</option>`).join('')}
        </select>
        <button class="btn btn-primary btn-sm" onclick="openModal()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          New Task
        </button>
      </div>
    </div>
    <div class="kanban-board">${cols}</div>`;

    const el = document.getElementById('k-search');
    if (el && filterText) el.focus();
  }

  let _dragId = null;
  function handleDragStart(e, id) {
    _dragId = id;
    e.dataTransfer.effectAllowed = 'move';
    e.target.classList.add('dragging');
  }
  function allowDrop(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.closest('.kanban-col')?.classList.add('drag-over');
  }
  function handleDragLeave(e) {
    e.currentTarget.closest('.kanban-col')?.classList.remove('drag-over');
  }
  async function handleDrop(e) {
    e.preventDefault();
    document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over'));
    const id = _dragId || e.dataTransfer.getData('text/plain');
    const col = e.currentTarget.closest('.kanban-col');
    if (!col || !id) return;
    const newStatus = col.getAttribute('data-status');
    const t = State.tasks.find(x => x.TaskID === id);
    if (!t || t.Status === newStatus) return;
    t.Status = newStatus;
    t.ActionType = STATUS_MAP[newStatus]?.action || '';
    // Stamp start/end timestamps on local state
    if (newStatus === 'In Progress' && !t.InProgressDate) {
      t.InProgressDate = new Date().toISOString();
    }
    if (newStatus === 'Completed') {
      t.ProgressPercent = 100;
      t.CompletedDate = new Date().toISOString();
    }
    renderKanban();
    try { await callServer('updateTaskStatus', id, newStatus); }
    catch (err) { console.warn('Status sync failed:', err); }

  /* ── EXPORT LOGIC ── */
  function generateFormalReportHTML() {
    const selMo = document.getElementById('r-mo-sel')?.value || 'N/A';
    const selEmp = document.getElementById('r-emp-mo-sel')?.value || 'All';

    // Filter tasks by the month they were CREATED (CreatedAt), not DueDate
    const monthTasks = State.tasks.filter(t => {
      // Fall back to DueDate if CreatedAt is missing (older records)
      const dateRef = t.CreatedAt || t.DueDate;
      if (!dateRef) return false;
      const d = new Date(dateRef);
      const isCorrectMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}` === selMo;
      const matchesEmp = selEmp === 'All' || t.AssignedTo === selEmp;
      return isCorrectMonth && matchesEmp;
    }).sort((a, b) => (a.AssignedTo || '').localeCompare(b.AssignedTo || ''));

    // Format date + time helper  e.g. "17 Apr 2026, 10:22 am"
    const fmtDT = (raw) => {
      if (!raw) return '—';
      try {
        const d = new Date(raw);
        if (isNaN(d.getTime())) return '—';
        const datePart = d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
        const timePart = d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
        return `${datePart}, ${timePart}`;
      } catch { return '—'; }
    };

    // Calculate duration between Start and End
    const calcDuration = (start, end, created) => {
      // Logic: Use start if available, else fall back to created
      const effectiveStart = start || created;
      if (!effectiveStart || !end) return '—';
      try {
        const s = new Date(effectiveStart);
        const e = new Date(end);
        if (isNaN(s.getTime()) || isNaN(e.getTime())) return '—';
        const diffMs = e - s;
        if (diffMs < 0) return '—';
        const totalMins = Math.floor(diffMs / 60000);
        const hrs = Math.floor(totalMins / 60);
        const mins = totalMins % 60;
        if (hrs === 0) return `${mins}m`;
        return `${hrs}h ${mins}m`;
      } catch { return '—'; }
    };

    return `
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <title>Monthly Task Report - ${selMo}</title>
      <style>
        body { font-family: "Segoe UI", Arial, sans-serif; padding: 40px; color: #1a1a1a; line-height: 1.4; background: #fff; }
        .header { margin-bottom: 24px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .header h1 { margin: 0; font-size: 22px; color: #000; letter-spacing: -0.01em; }
        .header p { margin: 5px 0 0; color: #444; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 1.5px solid #000; }
        th, td { border: 1px solid #000; padding: 7px 8px; text-align: left; font-size: 9.5px; word-wrap: break-word; vertical-align: top; }
        th { background-color: #f2f2f2; font-weight: bold; text-transform: uppercase; color: #000; font-size: 8.5px; letter-spacing: 0.04em; text-align: center; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .sr-no { text-align: center; font-weight: 700; }
        .status-cell { font-weight: bold; text-transform: uppercase; font-size: 8px; }
        @media print {
          body { padding: 0; }
          @page { margin: 1.2cm; size: landscape; }
        }
      </style>
    </head>
    <body>
      <div class="header">
        <h1>Monthly Employee Task Report</h1>
        <p><strong>Period:</strong> ${selMo} &nbsp;|&nbsp; <strong>Employee:</strong> ${selEmp === 'All' ? 'All Employees' : selEmp} &nbsp;|&nbsp; <strong>Generated on:</strong> ${new Date().toLocaleDateString('en-IN', {day:'2-digit', month:'long', year:'numeric'})}</p>
      </div>
      <table>
        <thead>
          <tr>
            <th style="width:3%">Sr. No.</th>
            <th style="width:10%">Allotted By</th>
            <th style="width:16%">Task</th>
            <th style="width:18%">Action Taken</th>
            <th style="width:11%">Created Date</th>
            <th style="width:11%">Start Date/Time</th>
            <th style="width:11%">End Date/Time</th>
            <th style="width:10%">Duration</th>
            <th style="width:10%">Status</th>
          </tr>
        </thead>
        <tbody>
          ${monthTasks.map((t, idx) => `
          <tr>
            <td class="sr-no">${idx + 1}</td>
            <td>${t.AssignedTo || '—'}</td>
            <td style="font-weight:600;white-space:pre-wrap">${t.Title || '—'}</td>
            <td style="white-space:pre-wrap">${t.Description || '—'}</td>
            <td>${fmtDT(t.CreatedAt)}</td>
            <td>${fmtDT(t.InProgressDate || t.CreatedAt)}</td>
            <td>${fmtDT(t.CompletedDate)}</td>
            <td style="text-align:center;">${calcDuration(t.InProgressDate, t.CompletedDate, t.CreatedAt)}</td>
            <td class="status-cell">${t.Status || '—'}</td>
          </tr>`).join('')}
          ${monthTasks.length === 0 ? '<tr><td colspan="9" style="text-align:center;padding:50px;color:#777">No records found for the selected period.</td></tr>' : ''}
        </tbody>
      </table>
      <div style="margin-top:36px;font-size:10px;color:#888;text-align:right;border-top:1px solid #eee;padding-top:10px;font-style:italic">
        Proprietary &amp; Confidential - Workflow Pro Monitoring System
      </div>
    </body>
    </html>`;

  }



  function printReport() {
    const html = generateFormalReportHTML();
    const win = window.open('', '_blank');
    if (!win) {
      alert('Pop-up blocked. Please allow pop-ups to print the formal report.');
      return;
    }
    win.document.write(html);
    win.document.close();
    win.onload = function() {
      win.print();
    };
  }

  async function downloadPDF(e) {
    const formalHTML = generateFormalReportHTML();
    const selMo = document.getElementById('r-mo-sel')?.value || 'N/A';
    const filename = `WorkflowPro_Monthly_Report_${selMo.replace(/-/g, '_')}.pdf`;

    const opt = {
      margin:       [0.4, 0.4],
      filename:     filename,
      image:        { type: 'jpeg', quality: 0.98 },
      html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
      jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
    };

    const btn = e ? e.currentTarget : null;
    const oldText = btn ? btn.innerHTML : '';
    if (btn) {
      btn.disabled = true;
      btn.innerHTML = '<div class="loader-sm" style="width:14px;height:14px;border-width:2px;display:inline-block;margin-right:5px;"></div> Exporting...';
    }

    try {
      await html2pdf().set(opt).from(formalHTML).save();
    } catch (err) {
      console.error('PDF Generation Error:', err);
      alert('Failed to generate formal PDF. Using the Print option as fallback.');
      printReport();
    } finally {
      if (btn) {
        btn.disabled = false;
        btn.innerHTML = oldText;
      }
    }
  }

  /* ── MONTHLY REPORT ── */
  function buildMonthlyReport() {
    const allMonthKeys = [...new Set(State.tasks
      .filter(t => t.DueDate)
      .map(t => { const d = new Date(t.DueDate); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; })
    )].sort().reverse();

    const selMo = document.getElementById('r-mo-sel')?.value || (allMonthKeys[0] || '');
    const selEmp = document.getElementById('r-emp-mo-sel')?.value || 'All';
    const monthStart = selMo ? new Date(selMo + '-01') : new Date();

    let due = 0, comp = 0, cfOpen = 0, actH = 0;
    const empStats = {};
    State.employees.forEach(e => empStats[e.Name] = { dept: e.Department, due: 0, comp: 0, open: 0, cf: 0, estH: 0, actH: 0 });

    State.tasks.forEach(t => {
      if (!t.DueDate) return;
      const d = new Date(t.DueDate);
      const tKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      const ongoing = t.Status !== 'Completed' && t.Status !== 'Cancelled';

      if (tKey === selMo) {
        due++;
        if (t.Status === 'Completed') comp++;
        else if (empStats[t.AssignedTo]) empStats[t.AssignedTo].open++;
        actH += roundNum(t.ActualHours);
        if (empStats[t.AssignedTo]) {
          empStats[t.AssignedTo].due++;
          if (t.Status === 'Completed') empStats[t.AssignedTo].comp++;
          empStats[t.AssignedTo].actH += roundNum(t.ActualHours);
          empStats[t.AssignedTo].estH += roundNum(t.EstHours);
        }
      } else if (d < monthStart && ongoing) {
        cfOpen++;
        if (empStats[t.AssignedTo]) empStats[t.AssignedTo].cf++;
      }
    });

    const monthTasks = State.tasks.filter(t => {
      if (!t.DueDate) return false;

  function buildManagerReport() {

    const open = total - comp;

    team.forEach(n => memberData[n] = { tasks: 0, comp: 0 });
    mgrTasks.forEach(t => {
      if (!memberData[t.AssignedTo]) return;
      memberData[t.AssignedTo].tasks++;
      if (t.Status === 'Completed') memberData[t.AssignedTo].comp++;

    return `

        <div><div class="kpi-label">Active Tasks</div><div class="fw-600">${open}</div></div>
        <div><div class="kpi-label">Global Completion</div><div class="fw-600" style="color:var(--success);">${total > 0 ? Math.round((comp / total) * 100) : 0}%</div></div>

  /* ── CHART RENDERER FOR REPORTS ── */
  function drawReportCharts() {
    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    const gridColor = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)';
    chartDefaults();

    const sub = State.activeSubView;

    if (sub === 'employee') {
      const selEmp = document.getElementById('r-emp-sel')?.value || '';
      const empTasks = State.tasks.filter(t => t.AssignedTo === selEmp);
      const stsOrder2 = Object.keys(STATUS_MAP);
      const stsCounts = stsOrder2.map(s => empTasks.filter(t => t.Status === s).length);

      safeChart('empStatusBar', {
        type: 'bar',
        data: {
          labels: stsOrder2,
          datasets: [{
            label: 'Tasks', data: stsCounts,
            backgroundColor: stsOrder2.map(s => STATUS_MAP[s].color + '99'),
            borderColor: stsOrder2.map(s => STATUS_MAP[s].color),
            borderWidth: 2, borderRadius: 6
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { x: { grid: { display: false } }, y: { beginAtZero: true, grid: { color: gridColor }, ticks: { stepSize: 1 } } }
        }
      });
    }

    if (sub === 'monthly') {
      const allMoKeys = [...new Set(State.tasks.filter(t => t.DueDate).map(t => {
        const d = new Date(t.DueDate);
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      }))].sort();
      const moData = {};
      allMoKeys.forEach(k => moData[k] = { due: 0, comp: 0, cf: 0 });
      State.tasks.forEach(t => {
        if (!t.DueDate) return;
        const d = new Date(t.DueDate);
        const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        if (moData[k]) {
          moData[k].due++;
          if (t.Status === 'Completed') moData[k].comp++;
        }
      });

      safeChart('monthTrendLine', {
        type: 'line',
        data: {
          labels: allMoKeys,
          datasets: [
            {
              label: 'Tasks Due', data: allMoKeys.map(k => moData[k].due),
              borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,0.1)',
              fill: true, tension: 0.4, pointRadius: 4
            },
            {
              label: 'Completed', data: allMoKeys.map(k => moData[k].comp),
              borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.08)',
              fill: true, tension: 0.4, pointRadius: 4
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'top' } },
          scales: { x: { grid: { color: gridColor } }, y: { beginAtZero: true, grid: { color: gridColor } } }
        }
      });

      const selMo = document.getElementById('r-mo-sel')?.value || '';
      let due = 0, comp = 0, open = 0;
      State.tasks.forEach(t => {
        if (!t.DueDate) return;
        const d = new Date(t.DueDate);
        const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
        if (k === selMo) {
          due++;
          if (t.Status === 'Completed') comp++;
          else open++;
        }
      });
      safeChart('monthBucketBar', {
        type: 'bar',
        data: {
          labels: ['Due', 'Completed', 'Open'],
          datasets: [{
            data: [due, comp, open],
            backgroundColor: ['#6366f188', '#10b98188', '#ef444488'],
            borderColor: ['#6366f1', '#10b981', '#ef4444'],
            borderWidth: 2, borderRadius: 8
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: { x: { beginAtZero: true, grid: { color: gridColor } }, y: { grid: { display: false } } }
        }
      });
    }

    if (sub === 'manager') {
      // Manager subview removed
    }

    if (sub === 'visual') {
      const stsOrder = Object.keys(STATUS_MAP);
      const stsCounts = stsOrder.map(s => State.tasks.filter(t => t.Status === s).length);

      safeChart('visStatusDoughnut', {
        type: 'doughnut',
        data: {
          labels: stsOrder,
          datasets: [{
            data: stsCounts,
            backgroundColor: stsOrder.map(s => STATUS_MAP[s].color + 'bb'),
            borderColor: isDark ? '#0d1420' : '#f8fafc', borderWidth: 2, hoverOffset: 8
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '60%',
          plugins: { legend: { position: 'right', labels: { padding: 12, usePointStyle: true } } }
        }
      });

      const prios = Object.keys(PRIORITY_MAP);
      safeChart('visPriorityBar', {
        type: 'bar',
        data: {
          labels: prios,
          datasets: [{
            label: 'Tasks',
            data: prios.map(p => State.tasks.filter(t => t.Priority === p).length),
            backgroundColor: prios.map(p => PRIORITY_MAP[p].color + '88'),
            borderColor: prios.map(p => PRIORITY_MAP[p].color),
            borderWidth: 2, borderRadius: 8
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { x: { grid: { display: false } }, y: { beginAtZero: true, grid: { color: gridColor } } }
        }
      });

      const empNames = State.employees.map(e => e.Name);
      safeChart('visEmpBar', {
        type: 'bar',
        data: {
          labels: empNames,
          datasets: [
            {
              label: 'Tasks', data: empNames.map(n => State.tasks.filter(t => t.AssignedTo === n).length),
              backgroundColor: 'rgba(99,102,241,0.55)', borderColor: '#6366f1', borderWidth: 2, borderRadius: 4
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { x: { grid: { display: false } }, y: { beginAtZero: true, grid: { color: gridColor } } }

      // Category Pie removed

  async function saveTask() {
    const title = document.getElementById('t-title').value.trim();
    const desc = document.getElementById('t-desc').value.trim();

    // Only Title and Description are required
    if (!title) { alert('Task title is required'); return; }
    if (!desc) { alert('Task description is required'); return; }

    const taskId = document.getElementById('task-form-inner').getAttribute('data-task-id');
    const newStatus = document.getElementById('t-status').value || 'Not Started';

    const payload = {
      Title: title,
      Description: desc,
      AssignedTo: document.getElementById('t-assignee').value || 'Unassigned',
      Priority: document.getElementById('t-priority').value || 'Medium',
      Status: newStatus,
      DueDate: document.getElementById('t-due').value || ''
    };

    if (newStatus === 'In Progress') {
      // Stamp InProgressDate only if not already set (first time going In Progress)
      const existing = State.tasks.find(x => x.TaskID === taskId);
      if (!existing || !existing.InProgressDate) {
        payload.InProgressDate = new Date().toISOString();
      }
    }
    if (newStatus === 'Completed' && !taskId) payload.CompletedDate = new Date().toISOString();
    if (newStatus === 'Completed' && taskId) payload.CompletedDate = new Date().toISOString();

    const saveBtn = document.querySelector('.modal-footer .btn-primary');
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving…'; }

    try {
      if (taskId) {
        payload.TaskID = taskId;
        await callServer('updateTaskDetails', payload);
        const i = State.tasks.findIndex(x => x.TaskID === taskId);
        if (i >= 0) State.tasks[i] = { ...State.tasks[i], ...payload };
      } else {
        const newId = await callServer('addTask', payload);
        payload.TaskID = newId;
        State.tasks.push(payload);
      }
      // Refresh stats
      const [stats, chartData] = await Promise.all([
        callServer('getDashboardStats'),
        callServer('getChartData')
      ]);
      State.stats = stats || State.stats;
      State.chartData = chartData || State.chartData;

      closeModal();
      setView(State.activeView);
    } catch (err) {
      alert('Save failed: ' + (err.message || err));
    } finally {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save Task'; }
    }
  }

    const sub = document.getElementById('auth-subtitle');

  async function handleLogin() {
    const user = document.getElementById('l-user').value.trim();
    const pass = document.getElementById('l-pass').value;
    if (!user || !pass) { alert('Please enter both username and password'); return; }

    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Authenticating...';

    try {
      const userData = await callServer('login', user, pass);
      State.user = userData;
      localStorage.setItem('wf-session', JSON.stringify(userData));
      await proceedToDashboard();
    } catch (err) {
      alert('Login Failed: ' + err.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Login';
    }
  }

  async function handleSignup() {
    const user = document.getElementById('s-user').value.trim();
    const email = document.getElementById('s-email').value.trim();
    const pass = document.getElementById('s-pass').value;

    if (!user || !email || !pass) { alert('All fields are required'); return; }

    const btn = document.getElementById('signup-btn');
    btn.disabled = true; btn.textContent = 'Creating...';

    try {
      // 1. Create the user account
      const userData = await callServer('signup', { username: user, password: pass, email: email, role: 'Employee' });

      // 2. Also add the same person as an employee so they appear in task assignment
      try {
        const empPayload = {
          Name: user,
          Email: email,
          Role: 'Employee',
          JoinDate: new Date().toISOString().split('T')[0],
          Status: 'Active',
          Department: 'Accounts',
          Manager: '',
          WeeklyCapacity: 40,
          Location: '',
          Notes: ''
        };
        await callServer('addEmployee', empPayload);
      } catch (empErr) {
        console.warn('Employee record creation skipped:', empErr.message);
      }

      alert('Account created successfully! Please login.');
      toggleAuth(false);
    } catch (err) {
      alert('Signup Failed: ' + err.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }

  function handleLogout() {
    localStorage.removeItem('wf-session');
    State.user = null;
    try {
      showAuthScreen(); // Clear UI immediately
    } catch (e) {}
    location.reload(); // Hard reset
  }

  async function proceedToDashboard() {
    console.log('Proceeding to Dashboard...');
    try {
      // Hide auth, show app
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('sidebar').style.display = 'flex';

      // Set UI names
      document.getElementById('user-display-name').textContent = State.user.username;
      document.getElementById('user-display-role').textContent = State.user.role || 'Workflow Pro';
      const avatar = document.getElementById('user-avatar');
      if (avatar) {
        avatar.textContent = getInitials(State.user.username);
        avatar.style.background = getAvatarColor(State.user.username);
      }

      await refreshData();
      setView('dashboard');
    } catch (err) {
      console.error('Proceed Error:', err);
      // Fallback: still show the dashboard layout but alert the user
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('sidebar').style.display = 'flex';
      setView('dashboard');
      alert('Welcome, and note: There was an issue loading your latest tasks. Please try refreshing the page.');
    }
  }

  // ======================================================
  //  BOOT
  // ======================================================
  window.addEventListener('load', init);

  // Global error handler
  window.addEventListener('unhandledrejection', e => {
    console.error('Unhandled Promise Rejection:', e.reason);
  });
</script>
