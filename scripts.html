<script>
  'use strict';

  // ======================================================
  //  WORKFLOW PRO — MASTER SCRIPT v4.0
  // ======================================================

  /**
   * NOTE: "Unrecognized feature" warnings in the console (ambient-light-sensor, speaker, etc.)
   * are standard for Google Apps Script environments and can be safely ignored.
   * They do NOT affect the functionality of this application.
   */

  /* ── CONSTANTS ── */
  const STATUS_MAP = {
    'Not Started': { action: 'Plan', color: '#64748b', bg: 'rgba(100,116,139,0.15)', css: 'status-not-started' },
    'In Progress': { action: 'Execute', color: '#3b82f6', bg: 'rgba(59,130,246,0.15)', css: 'status-in-progress' },
    'Review': { action: 'Review', color: '#f59e0b', bg: 'rgba(245,158,11,0.15)', css: 'status-review' },
    'On Hold': { action: 'Wait', color: '#8b5cf6', bg: 'rgba(139,92,246,0.15)', css: 'status-on-hold' },
    'Blocked': { action: 'Escalate', color: '#ef4444', bg: 'rgba(239,68,68,0.15)', css: 'status-blocked' },
    'Completed': { action: 'Close', color: '#10b981', bg: 'rgba(16,185,129,0.15)', css: 'status-completed' },
    'Cancelled': { action: 'Cancel', color: '#6b7280', bg: 'rgba(107,114,128,0.15)', css: 'status-cancelled' }
  };

  const PRIORITY_MAP = {
    'Critical': { color: '#dc2626', css: 'priority-critical', order: 0 },
    'High': { color: '#ef4444', css: 'priority-high', order: 1 },
    'Medium': { color: '#f59e0b', css: 'priority-medium', order: 2 },
    'Low': { color: '#10b981', css: 'priority-low', order: 3 }
  };

  const KANBAN_COLS = ['Not Started', 'In Progress', 'Review', 'Blocked', 'Completed'];

  const AVATAR_COLORS = ['#6366f1', '#14b8a6', '#f59e0b', '#ef4444', '#8b5cf6', '#3b82f6', '#10b981', '#ec4899'];

  /* ── STATE ── */
  const State = {
    user: null, // Stores { username, role, email }
    tasks: [],
    employees: [],
    stats: {},
    chartData: {},
    activeView: 'dashboard',
    activeSubView: 'employee',
    chartInstances: [],
    isLoading: false,
    kanbanFilter: { text: '', priority: 'All', assignee: [], status: 'All' },
    isKanbanFilterOpen: false
  };

  /* ── MOBILE DETECTION ── */
  function isMobile() { return window.innerWidth <= 768; }

  function syncMobileChrome() {
    const mobile = isMobile();
    const topHeader = document.getElementById('mob-top-header');
    const bottomNav = document.getElementById('mob-bottom-nav');
    if (topHeader) topHeader.style.display = mobile ? 'flex' : 'none';
    if (bottomNav) bottomNav.style.display = 'none'; // Fixed: Ensuring bottom nav is hidden
  }

  window.addEventListener('resize', syncMobileChrome);

  /* ── SERVER BRIDGE ── */
  function callServer(method, p1, p2) {
    const userEmail = State.user ? State.user.email : '';
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(res => {
          if (res && res.success) resolve(res.data);
          else reject(new Error(res ? res.error : 'Unknown error'));
        })
        .withFailureHandler(err => reject(err))
        .api(method, p1, p2, userEmail);
    });
  }

  /* ── HELPERS ── */
  function formatDate(raw) {
    if (!raw) return '—';
    try {
      const d = new Date(raw);
      if (isNaN(d.getTime())) return '—';
      return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch { return '—'; }
  }

  function formatISO(raw) {
    if (!raw) return '';
    try {
      const d = new Date(raw);
      if (isNaN(d.getTime())) return '';
      return d.toISOString().split('T')[0];
    } catch { return ''; }
  }

  function formatOverdueDate(raw) {
    if (!raw) return '';
    try {
      const d = new Date(raw);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
    } catch { return ''; }
  }

  function formatFullDateTime(raw) {
    if (!raw) return '—';
    try {
      const d = new Date(raw);
      if (isNaN(d.getTime())) return '—';
      return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })
           + ' ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
    } catch { return '—'; }
  }

  function showHideTimestampFields() {
    const statusSelect = document.getElementById('t-status');
    const status = statusSelect ? statusSelect.value : '';
    const group = document.getElementById('timestamp-fields-group');
    const startWrap = document.getElementById('t-inprogress-wrap');
    const endWrap = document.getElementById('t-completed-wrap');
    const startDate = document.getElementById('t-inprogress-date')?.value;
    const endDate = document.getElementById('t-completed-date')?.value;

    if (!group || !startWrap || !endWrap) return;

    let showGroup = false;

    // Show start date if status is In Progress/Completed AND we have a value
    if ((status === 'In Progress' || status === 'Completed') && startDate && startDate !== '—') {
      startWrap.style.display = 'block';
      showGroup = true;
    } else {
      startWrap.style.display = 'none';
    }

    // Show end date if status is Completed AND we have a value
    if (status === 'Completed' && endDate && endDate !== '—') {
      endWrap.style.display = 'block';
      showGroup = true;
    } else {
      endWrap.style.display = 'none';
    }

    group.style.display = showGroup ? 'grid' : 'none';
  }

  function getInitials(name) {
    if (!name) return '??';
    return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
  }

  function getAvatarColor(name) {
    if (!name) return AVATAR_COLORS[0];
    let hash = 0;
    for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
    return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
  }

  function statusBadge(status) {
    const s = STATUS_MAP[status] || STATUS_MAP['Not Started'];
    return `<span class="badge ${s.css}">${status || '—'}</span>`;
  }

  function priorityBadge(priority) {
    const p = PRIORITY_MAP[priority];
    if (!p) return `<span class="badge">${priority || '—'}</span>`;
    return `<span class="badge ${p.css}">${priority}</span>`;
  }

  function progressBar(pct, color) {
    const val = Math.min(100, Math.max(0, parseFloat(pct) || 0));
    const col = color || (val >= 80 ? '#10b981' : val >= 50 ? '#f59e0b' : '#3b82f6');
    return `
    <div style="display:flex; align-items:center; gap:0.5rem;">
      <div class="progress-bar" style="flex:1; width:80px;">
        <div class="progress-fill" style="width:${val}%; background:${col};"></div>
      </div>
      <span class="text-xs text-muted">${val}%</span>
    </div>`;
  }

  function roundNum(n) { return Math.round((parseFloat(n) || 0) * 10) / 10; }

  /* ── DATA LOADING ── */
  async function refreshData() {
    try {
      const [tasks, employees, stats, chartData] = await Promise.all([
        callServer('getRecords', 'DB_Tasks'),
        callServer('getRecords', 'DB_Employees'),
        callServer('getDashboardStats'),
        callServer('getChartData')
      ]);
      State.tasks = tasks || [];
      State.employees = employees || [];
      State.stats = stats || {};
      State.chartData = chartData || {};
    } catch (err) {
      console.error('Data load error:', err);
      throw err;
    }
  }

  /* ── INIT ── */
  async function init() {
    console.log('%c App Init: Starting Workflow Pro Auth Check ', 'background: #6366f1; color: #fff; padding: 2px 5px; border-radius: 3px;');

    // Check Session
    const session = localStorage.getItem('wf-session');

    if (session) {
      try {
        console.log('Session: Found existing session. Validating...');
        State.user = JSON.parse(session);
        await proceedToDashboard();
      } catch (e) {
        console.warn('Session: Invalid or corrupted session. Clearing.');
        localStorage.removeItem('wf-session');
        showAuthScreen();
      }
    } else {
      console.log('Session: No session found. Showing Login screen.');
      showAuthScreen();
    }

    // Apply saved theme
    const savedTheme = localStorage.getItem('wf-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    updateThemeIcon(savedTheme);
  }

  function showAuthScreen() {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('content').innerHTML = '';
    const topHeader = document.getElementById('mob-top-header');
    const bottomNav = document.getElementById('mob-bottom-nav');
    if (topHeader) topHeader.style.display = 'none';
    if (bottomNav) bottomNav.style.display = 'none';
  }

  /* ── ROUTER ── */
  function setView(view) {
    State.activeView = view;
    closeSidebar();

    // Sync Desktop Nav
    document.querySelectorAll('#sidebar nav button').forEach(btn => {
      btn.classList.remove('active');
      if (btn.getAttribute('onclick')?.includes(`'${view}'`)) btn.classList.add('active');
    });

    // Sync Mobile Bottom Nav
    document.querySelectorAll('.mob-bottom-nav-btn[data-view]').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-view') === view);
    });

    destroyCharts();
    if (view === 'dashboard') renderDashboard();
    if (view === 'kanban') renderKanban();
    if (view === 'reports') renderReports();
    if (view === 'employees') renderEmployees();
  }

  /* ── DESTROY ALL CHARTS ── */
  function destroyCharts() {
    State.chartInstances.forEach(c => { try { c.destroy(); } catch (e) { } });
    State.chartInstances = [];
  }

  /* ── CHART DEFAULTS ── */
  function chartDefaults() {
    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    Chart.defaults.color = isDark ? '#7b8db8' : '#64748b';
    Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
    Chart.defaults.font.size = 12;
    Chart.defaults.borderColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)';
  }

  function safeChart(id, config) {
    const el = document.getElementById(id);
    if (!el) return;
    try {
      chartDefaults();
      const instance = new Chart(el.getContext('2d'), config);
      State.chartInstances.push(instance);
    } catch (e) { console.warn('Chart error', id, e); }
  }

  // ======================================================
  //  DASHBOARD VIEW
  // ======================================================
  function renderDashboard() {
    const main = document.getElementById('content');
    const s = State.stats;
    const openTasks = (s.total || 0) - (s.completed || 0);
    const hrsVar = roundNum((s.estTotalHours || 0) - (s.actualTotalHours || 0));

    // 12-month trend
    const monthMap = {};
    const now = new Date();
    for (let i = 0; i < 12; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - 11 + i, 1);
      const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      monthMap[k] = { due: 0, comp: 0, actHrs: 0 };
    }
    State.tasks.forEach(t => {
      if (!t.DueDate) return;
      const d = new Date(t.DueDate);
      const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      if (monthMap[k]) {
        monthMap[k].due++;
        if (t.Status === 'Completed') monthMap[k].comp++;
      }
    });

    // Status counts including On Hold & Cancelled
    const stsOrder = ['Not Started', 'In Progress', 'Review', 'On Hold', 'Blocked', 'Completed', 'Cancelled'];
    const stsCount = {};
    stsOrder.forEach(s => stsCount[s] = 0);
    State.tasks.forEach(t => { if (stsCount[t.Status] !== undefined) stsCount[t.Status]++; });

    // Employee workload
    const empWork = {};
    State.employees.forEach(e => empWork[e.Name] = { tasks: 0, overdue: 0, comp: 0 });
    State.tasks.forEach(t => {
      if (empWork[t.AssignedTo]) {
        empWork[t.AssignedTo].tasks++;
        const isOverdue = t.Status !== 'Completed' && t.Status !== 'Cancelled' && t.DueDate && new Date(t.DueDate) < now;
        if (isOverdue) empWork[t.AssignedTo].overdue++;
        if (t.Status === 'Completed') empWork[t.AssignedTo].comp++;
      }
    });

    const kpiCards = [
      { label: 'Total Tasks', value: s.total || 0, sub: 'All tracked tasks', color: '#6366f1', icon: '📋' },
      { label: 'Open Tasks', value: openTasks, sub: `${s.completionRate || 0}% complete`, color: '#3b82f6', icon: '🔄' },
      { label: 'Completed', value: s.completed || 0, sub: 'Successfully delivered', color: '#10b981', icon: '✅' },
      { label: 'Overdue', value: s.overdue || 0, sub: 'Need immediate attention', color: '#ef4444', icon: '⚠️' }
    ];

    const monthKeys = Object.keys(monthMap).sort();

    // Recent tasks list for Mobile (inject after grids)
    let recentTasksHTML = '';
    if (isMobile()) {
      const recent = [...State.tasks].sort((a,b) => new Date(b.DueDate||0) - new Date(a.DueDate||0)).slice(0, 5);
      recentTasksHTML = `
        <div class="mob-recent-tasks">
          <div style="font-size:0.85rem; font-weight:800; margin: 0.5rem 0 0.75rem;">Recent Tasks</div>
          ${recent.map(t => `
            <div class="mob-task-card" onclick="openModal('${t.TaskID}')">
              <div class="mob-task-card-left">
                <div class="mob-task-card-title">${t.Title}</div>
                <div class="mob-task-card-meta">
                  ${statusBadge(t.Status)}
                  <span class="mob-task-card-due">${formatOverdueDate(t.DueDate)}</span>
                </div>
              </div>
              <div class="mob-task-card-right">
                <div class="mob-task-assignee" style="background:${getAvatarColor(t.AssignedTo)}">${getInitials(t.AssignedTo)}</div>
              </div>
            </div>
          `).join('')}
          <button class="btn btn-ghost btn-sm" style="width:100%; margin-top:0.5rem;" onclick="setView('kanban')">View All Tasks</button>
        </div>
      `;
    }

    main.innerHTML = `
    <div class="page-header">
      <div class="page-title-group">
        <h1>Dashboard</h1>
        <p>Project delivery overview — all teams, all time</p>
      </div>
      ${isMobile() ? `<div class="page-actions"><button class="btn btn-primary" onclick="openModal()">+ Task</button></div>` : ''}
    </div>

    <div class="kpi-grid">
      ${kpiCards.map(k => `
        <div class="kpi-card">
          <div class="kpi-icon" style="background:${k.color}1a; border:1px solid ${k.color}30;">
            <span style="font-size:1.1rem">${k.icon}</span>
          </div>
          <div class="kpi-label">${k.label}</div>
          <div class="kpi-value" style="color:${k.color}">${k.value}</div>
          <div class="kpi-sub">${k.sub}</div>
        </div>
      `).join('')}
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">Productivity Trend</div>
        <div class="chart-subtitle">Tasks due vs completed monthly</div>
        <div class="chart-canvas-wrap"><canvas id="dashTrendChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Status Breakdown</div>
        <div class="chart-subtitle">Current task distribution</div>
        <div class="chart-canvas-wrap"><canvas id="dashStatusChart"></canvas></div>
      </div>
    </div>

    ${recentTasksHTML}

    <div class="triple-grid">
      <!-- Hidden on mobile via CSS -->
      <div class="table-card">
        <div class="section-card-header">
          <div class="section-title">📅 12-Month Trend</div>
        </div>
        <div class="data-table-wrap">
          <table>
            <thead><tr><th>Month</th><th>Due</th><th>Done</th></tr></thead>
            <tbody>
              ${monthKeys.map(k => `<tr><td class="cell-primary cell-mono">${k}</td><td>${monthMap[k].due}</td><td>${monthMap[k].comp}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
      <div class="table-card">
        <div class="section-card-header"><div class="section-title">📊 Status Summary</div></div>
        <div class="data-table-wrap">
          <table>
            <thead><tr><th>Status</th><th>Count</th></tr></thead>
            <tbody>
              ${stsOrder.map(k => `<tr><td>${statusBadge(k)}</td><td class="cell-primary">${stsCount[k]}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
      <div class="table-card">
        <div class="section-card-header"><div class="section-title">👥 Team Workload</div></div>
        <div class="data-table-wrap">
          <table>
            <thead><tr><th>Member</th><th>Tasks</th><th>⚠️</th></tr></thead>
            <tbody>
              ${Object.keys(empWork).map(n => `<tr><td><span class="cell-primary">${n}</span></td><td>${empWork[n].tasks}</td><td>${empWork[n].overdue}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

    // Draw charts after render
    setTimeout(() => {
      const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
      const gridColor = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)';

      safeChart('dashTrendChart', {
        type: 'line',
        data: {
          labels: monthKeys,
          datasets: [
            {
              label: 'Tasks Due', data: monthKeys.map(k => monthMap[k].due),
              borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,0.12)',
              fill: true, tension: 0.4, pointRadius: 4, pointHoverRadius: 6
            },
            {
              label: 'Completed', data: monthKeys.map(k => monthMap[k].comp),
              borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.08)',
              fill: true, tension: 0.4, pointRadius: 4, pointHoverRadius: 6
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'top' } },
          scales: { x: { grid: { color: gridColor } }, y: { beginAtZero: true, grid: { color: gridColor } } }
        }
      });

      safeChart('dashStatusChart', {
        type: 'doughnut',
        data: {
          labels: stsOrder.filter(k => stsCount[k] > 0),
          datasets: [{
            data: stsOrder.filter(k => stsCount[k] > 0).map(k => stsCount[k]),
            backgroundColor: stsOrder.filter(k => stsCount[k] > 0).map(k => STATUS_MAP[k]?.color || '#64748b'),
            borderWidth: 2, borderColor: isDark ? '#0d1420' : '#f8fafc', hoverOffset: 6
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '65%',
          plugins: { legend: { position: 'bottom', labels: { padding: 12, usePointStyle: true } } }
        }
      });
    }, 60);
  }

  // ======================================================
  //  KANBAN BOARD VIEW
  // ======================================================
  /* ── KANBAN HELPERS ── */
  function toggleFilterPanel() {
    State.isKanbanFilterOpen = !State.isKanbanFilterOpen;
    document.getElementById('filter-panel').classList.toggle('open', State.isKanbanFilterOpen);
  }

  function setKanbanFilter(key, val) {
    State.kanbanFilter[key] = val;
    renderKanban();
  }

  function toggleAssigneeFilter(name) {
    const filter = State.kanbanFilter.assignee;
    const idx = filter.indexOf(name);
    if (idx === -1) filter.push(name);
    else filter.splice(idx, 1);
    renderKanban();
  }

  function clearAssigneeFilter(name) {
    State.kanbanFilter.assignee = State.kanbanFilter.assignee.filter(n => n !== name);
    renderKanban();
  }

  function clearKanbanFilters() {
    State.kanbanFilter = { text: '', priority: 'All', assignee: [], status: 'All' };
    const searchInput = document.getElementById('k-search');
    if (searchInput) searchInput.value = '';
    renderKanban();
  }

  function renderKanban() {
    const main = document.getElementById('content');
    const f = State.kanbanFilter;
    
    // Sync search input value if already rendered
    const currentSearch = document.getElementById('k-search')?.value || '';
    if (currentSearch !== f.text && document.getElementById('k-search')) {
       // Only sync if input exists and text differs
    }

    const filteredTasks = State.tasks.filter(t => {
      const matchText = !f.text || 
        (t.Title || '').toLowerCase().includes(f.text.toLowerCase()) || 
        (t.TaskID || '').toLowerCase().includes(f.text.toLowerCase());
      const matchPrio = f.priority === 'All' || t.Priority === f.priority;
      const matchEmp  = f.assignee.length === 0 || f.assignee.includes(t.AssignedTo || 'Unassigned');
      const matchSts  = f.status   === 'All' || t.Status === f.status;
      return matchText && matchPrio && matchEmp && matchSts;
    });

    const grouped = {};
    KANBAN_COLS.forEach(c => grouped[c] = []);
    filteredTasks.forEach(t => {
      if (grouped[t.Status]) grouped[t.Status].push(t);
      else grouped['Not Started'].push(t);
    });

    // Active filter count
    const activeCount = [f.priority, f.status].filter(v => v !== 'All').length + (f.assignee.length > 0 ? 1 : 0);

    // Build team avatar stack
    const allNames = [...new Set(State.tasks.map(t => t.AssignedTo || 'Unassigned'))].sort();
    // Prioritize showing some diverse ones, but always include Unassigned
    const sorted = allNames.filter(n => n !== 'Unassigned').slice(0, 7);
    if (allNames.includes('Unassigned')) sorted.unshift('Unassigned');

    const avatarStack = sorted.map(name => {
      const isActive = f.assignee.includes(name);
      if (name === 'Unassigned') {
        return `
        <div class="k-avatar k-avatar-unassigned ${isActive ? 'k-avatar-active' : ''}" 
             title="Unassigned"
             onclick="toggleAssigneeFilter('Unassigned')"
             ondblclick="clearAssigneeFilter('Unassigned')"
             style="background:#475569; padding:0; overflow:hidden;">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="color:white; margin-top:4px;">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </div>`;
      }
      return `
      <div class="k-avatar ${isActive ? 'k-avatar-active' : ''}" title="${name}"
           style="background:${getAvatarColor(name)}"
           onclick="toggleAssigneeFilter('${name}')"
           ondblclick="clearAssigneeFilter('${name}')">
        ${getInitials(name)}
      </div>`;
    }).join('');

    const cols = KANBAN_COLS.map(col => {
      const colTotal = State.tasks.filter(t => t.Status === col).length;
      const cards = grouped[col].map(t => {
        const pColor = PRIORITY_MAP[t.Priority]?.color || '#9ca3af';
        const isOverdue = t.DueDate && new Date(t.DueDate) < new Date() && !['Completed','Cancelled','Blocked'].includes(t.Status);

        return `
        <div class="kanban-card" draggable="true" id="card-${t.TaskID}"
             ondragstart="handleDragStart(event,'${t.TaskID}')"
             style="border-left-color: ${pColor}">
          <div>
            <div class="kanban-card-title" onclick="openModal('${t.TaskID}')">${t.Title || 'Untitled'}</div>
            <div class="kanban-card-desc">${t.Description || 'No description'}</div>

  let _dragId = null;
  function handleDragStart(e, id) {
    _dragId = id;
    e.dataTransfer.effectAllowed = 'move';
    e.target.classList.add('dragging');
  }
  function allowDrop(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.closest('.kanban-col')?.classList.add('drag-over');
  }
  function handleDragLeave(e) {
    e.currentTarget.closest('.kanban-col')?.classList.remove('drag-over');
  }
  async function handleDrop(e) {
    e.preventDefault();
    document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over'));
    const id = _dragId || e.dataTransfer.getData('text/plain');
    const col = e.currentTarget.closest('.kanban-col');
    if (!col || !id) return;
    const newStatus = col.getAttribute('data-status');
    const t = State.tasks.find(x => x.TaskID === id);
    if (!t || t.Status === newStatus) return;
    t.Status = newStatus;
    t.ActionType = STATUS_MAP[newStatus]?.action || '';
    // Stamp start/end timestamps on local state
    if (newStatus === 'In Progress' && !t.InProgressDate) {
      t.InProgressDate = new Date().toISOString();
    }
    if (newStatus === 'Completed') {
      t.ProgressPercent = 100;
      t.CompletedDate = new Date().toISOString();
    }
    renderKanban();
    try {
      await callServer('updateTaskStatus', id, newStatus);
      const idx = State.tasks.findIndex(x => x.TaskID === id);
      if (idx >= 0) {
        if (newStatus === 'Completed') State.tasks[idx].CompletedDate = new Date().toISOString();
        if (newStatus === 'In Progress' && !State.tasks[idx].InProgressDate) State.tasks[idx].InProgressDate = new Date().toISOString();
      }
    }
    catch (err) { console.warn('Status sync failed:', err); }
  }
  document.addEventListener('dragend', e => {
    document.querySelectorAll('.kanban-card').forEach(c => c.classList.remove('dragging'));
    _dragId = null;
  });

  const fmtDT = (raw) => {
    if (!raw) return '';
    try {
      const d = new Date(raw);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'})
           + ' ' + d.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', hour12:true});

  const calcDuration = (start, end, created) => {
    const s = new Date(start || created);
    const e = new Date(end);
    if (!end || isNaN(s) || isNaN(e) || e < s) return '';
    const mins = Math.floor((e - s) / 60000);
    const h = Math.floor(mins / 60), m = mins % 60;

  /* ── MONTHLY REPORT ── */
  function buildMonthlyReport() {
    const allMonthKeys = [...new Set(State.tasks
      .filter(t => t.DueDate)
      .map(t => { const d = new Date(t.DueDate); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; })
    )].sort().reverse();

    const selMo = document.getElementById('r-mo-sel')?.value || (allMonthKeys[0] || '');
    const selEmp = document.getElementById('r-emp-mo-sel')?.value || 'All';
    const monthStart = selMo ? new Date(selMo + '-01') : new Date();

    let due = 0, comp = 0, cfOpen = 0, actH = 0;
    const empStats = {};
    State.employees.forEach(e => empStats[e.Name] = { dept: e.Department, due: 0, comp: 0, open: 0, cf: 0, estH: 0, actH: 0 });

    State.tasks.forEach(t => {
      if (!t.DueDate) return;
      const d = new Date(t.DueDate);
      const tKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      const ongoing = t.Status !== 'Completed' && t.Status !== 'Cancelled';

      if (tKey === selMo) {
        due++;
        if (t.Status === 'Completed') comp++;
        else if (empStats[t.AssignedTo]) empStats[t.AssignedTo].open++;
        actH += roundNum(t.ActualHours);
        if (empStats[t.AssignedTo]) {
          empStats[t.AssignedTo].due++;
          if (t.Status === 'Completed') empStats[t.AssignedTo].comp++;
          empStats[t.AssignedTo].actH += roundNum(t.ActualHours);
          empStats[t.AssignedTo].estH += roundNum(t.EstHours);
        }
      } else if (d < monthStart && ongoing) {
        cfOpen++;
        if (empStats[t.AssignedTo]) empStats[t.AssignedTo].cf++;
      }
    });

    const monthTasks = State.tasks.filter(t => {
      if (!t.DueDate) return false;
      const d = new Date(t.DueDate);
      const isCorrectMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}` === selMo;
      const matchesEmp = selEmp === 'All' || t.AssignedTo === selEmp;
      return isCorrectMonth && matchesEmp;
    }).sort((a, b) => (a.AssignedTo || '').localeCompare(b.AssignedTo || ''));

    return `

      <div class="kpi-card"><div class="kpi-label">Tasks Due</div><div class="kpi-value" style="color:#6366f1;">${due}</div></div>
      <div class="kpi-card"><div class="kpi-label">Completed</div><div class="kpi-value" style="color:#10b981;">${comp}</div></div>
      <div class="kpi-card"><div class="kpi-label">Carry Forward Open</div><div class="kpi-value" style="color:#ef4444;">${cfOpen}</div></div>
    </div>

    <div class="charts-grid" style="grid-template-columns:2fr 1fr;margin-bottom:1.5rem;">
      <div class="chart-card">
        <div class="chart-title">Monthly Trend — All Time</div>
        <div class="chart-subtitle">Tasks due vs completed across months</div>
        <div class="chart-canvas-wrap-tall"><canvas id="monthTrendLine"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">This Month KPIs</div>
        <div class="chart-subtitle">Bucket completion ratio</div>
        <div class="chart-canvas-wrap-tall"><canvas id="monthBucketBar"></canvas></div>
      </div>
    </div>

    <div class="table-card" style="margin-bottom:1.5rem;">
      <div class="table-header"><div class="table-title">Employee Summary — ${selMo}</div></div>
      <div class="data-table-wrap">
        <table>
          <thead><tr><th>Employee</th><th>Role</th><th>Tasks Due</th><th>Completed</th><th>Open</th><th>Completion %</th></tr></thead>
          <tbody>
            ${Object.keys(empStats).map(n => {
      const e = empStats[n];
      const pct = e.due > 0 ? Math.round((e.comp / e.due) * 100) : 0;
      if (e.due === 0 && e.cf === 0) return '';
      return `<tr>
                <td class="cell-primary text-xs">${n}</td>
                <td class="text-xs">${e.dept || '—'}</td>
                <td class="text-xs">${e.due}</td>
                <td class="text-xs" style="color:var(--success);">${e.comp}</td>
                <td class="text-xs">${e.open}</td>
                <td style="min-width:130px;">${progressBar(pct, pct >= 80 ? '#10b981' : '#f59e0b')}</td>
              </tr>`;
    }).join('')}
          </tbody>
        </table>
      </div>
    </div>
    
    <!-- Detailed Task List -->
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">Employee-wise Task Details — ${selMo}</div>
      </div>
      <div class="data-table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:20%;">Employee</th>

  /* ── MANAGER REPORT ── */
  function buildManagerReport() {
    const team = State.employees.map(e => e.Name);
    const mgrTasks = State.tasks;

    const total = mgrTasks.length;
    const comp = mgrTasks.filter(t => t.Status === 'Completed').length;
    const open = total - comp;

    // Per-member breakdown
    const memberData = {};
    team.forEach(n => memberData[n] = { tasks: 0, comp: 0 });
    mgrTasks.forEach(t => {
      if (!memberData[t.AssignedTo]) return;
      memberData[t.AssignedTo].tasks++;
      if (t.Status === 'Completed') memberData[t.AssignedTo].comp++;
    });

    return `
    <div class="section-card" style="margin-bottom:1.5rem;">
      <div class="section-card-header">

      ].map(([l, v, c]) => `<div class="kpi-card" style="text-align:center;padding:1rem;"><div class="kpi-label">${l}</div><div class="kpi-value" style="font-size:1.4rem;color:${c};">${v}</div></div>`).join('')}

  // ── EMPLOYEE MODAL LOGIC ──
  function openEmpModal(empId = null) {
    const overlay = document.getElementById('employee-modal');
    const inner = document.getElementById('employee-form-inner');
    const isEdit = empId !== null && empId !== '';
    
    // Track ID for saving
    inner.setAttribute('data-emp-id', empId || '');

    // Update modal title
    document.querySelector('#employee-modal .modal-title').textContent = isEdit ? 'Edit Team Member' : 'New Team Member';
    
    // Show/hide password fields
    document.getElementById('e-password').closest('.form-group').style.display = isEdit ? 'none' : 'block';
    document.getElementById('e-new-password').closest('.form-group').style.display = isEdit ? 'block' : 'none';

    if (isEdit) {
      const emp = State.employees.find(e => e.EmpID === empId);
      if (emp) {
        document.getElementById('e-name').value = emp.Name || '';
        document.getElementById('e-email').value = emp.Email || '';
        document.getElementById('e-role').value = emp.Role || 'Employee';
        document.getElementById('e-join-date').value = formatISO(emp.JoinDate);
        document.getElementById('e-new-password').value = '';
      }
    } else {
      ['e-name', 'e-email', 'e-password', 'e-join-date'].forEach(id => {
        const el = document.getElementById(id); if (el) el.value = '';
      });
      document.getElementById('e-role').value = 'Employee';
    }

    if (overlay) overlay.classList.add('open');
  }

  function closeEmpModal() {
    document.getElementById('employee-modal').classList.remove('open');
  }

  function handleEmpModalOverlayClick(e) {
    if (e.target === document.getElementById('employee-modal')) closeEmpModal();
  }

  async function saveEmployee() {
    const empId = document.getElementById('employee-form-inner').getAttribute('data-emp-id');
    const isEdit = empId !== null && empId !== '';

    const name = document.getElementById('e-name').value.trim();
    const email = document.getElementById('e-email').value.trim();
    const role = document.getElementById('e-role').value;
  
    if (!name || !email) { 
      alert('Name and Email are required'); 
      return; 
    }

    const payload = {
      Name: name,
      Email: email,
      Role: role,
      JoinDate: document.getElementById('e-join-date').value || new Date().toISOString().split('T')[0],
      Status: 'Active',
      Department: 'Accounts'
    };

    const saveBtn = document.querySelector('#employee-modal .btn-primary');
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving…'; }

    try {
      if (isEdit) {
        payload.EmpID = empId;
        payload.NewPassword = document.getElementById('e-new-password').value.trim();
        await callServer('updateEmployee', payload);
        const i = State.employees.findIndex(e => e.EmpID === empId);
        if (i >= 0) State.employees[i] = { ...State.employees[i], ...payload };
      } else {
        const password = document.getElementById('e-password').value.trim();
        if (!password) { alert('Password is required'); saveBtn.disabled = false; saveBtn.textContent='Save Member'; return; }
        payload.Password = password;
        const newId = await callServer('addEmployee', payload);
        payload.EmpID = newId;
        State.employees.push(payload);
      }

      closeEmpModal();
      if (State.activeView === 'employees') renderEmployees();
    } catch (err) {
      alert('Save failed: ' + (err.message || err));
    } finally {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save Member'; }
    }
  }
  async function confirmDeleteEmployee(empId, empName) {
    const confirmed = confirm(`Delete "${empName}" from the team?\n\nThis action cannot be undone.`);
    if (!confirmed) return;

    try {
      await callServer('deleteMember', empId);
      // Remove from local state immediately
      State.employees = State.employees.filter(e => e.EmpID !== empId);
      // Re-render the view
      renderEmployees();
    } catch (err) {
      alert('Delete failed: ' + (err.message || err));
    }
  }

      const t = State.tasks.find(x => x.TaskID === taskId);
      document.getElementById('modal-title').textContent = `Edit Task`;
      document.getElementById('modal-subtitle').textContent = `${taskId} · Click Save to update Google Sheets`;
      if (t) {
        document.getElementById('t-title').value = t.Title || '';
        document.getElementById('t-desc').value = t.Description || '';
        document.getElementById('t-assignee').value = t.AssignedTo || '';
        document.getElementById('t-priority').value = t.Priority || 'Medium';
        document.getElementById('t-status').value = t.Status || 'Not Started';
        document.getElementById('t-due').value = formatISO(t.DueDate);
        
        // PART 3 — Populate readonly fields
        document.getElementById('t-inprogress-date').value = formatFullDateTime(t.InProgressDate);
        document.getElementById('t-completed-date').value = formatFullDateTime(t.CompletedDate);
        showHideTimestampFields();
      }
    } else {
      document.getElementById('modal-title').textContent = 'New Task';
      document.getElementById('modal-subtitle').textContent = 'Fill in the basic details for the accounts task';
      ['t-title', 't-desc', 't-due', 't-inprogress-date', 't-completed-date'].forEach(id => {
        const el = document.getElementById(id); if (el) el.value = '';
      });
      document.getElementById('t-priority').value = 'Medium';
      document.getElementById('t-status').value = 'Not Started';
      document.getElementById('t-assignee').value = '';
      showHideTimestampFields();
    }

    overlay.classList.add('open');
  }

  function closeModal() {
    document.getElementById('task-modal').classList.remove('open');
  }

  function handleModalOverlayClick(e) {
    if (e.target === document.getElementById('task-modal')) closeModal();
  }

  async function saveTask() {
    const title = document.getElementById('t-title').value.trim();
    const desc = document.getElementById('t-desc').value.trim();

    // Only Title and Description are required
    if (!title) { alert('Task title is required'); return; }
    if (!desc) { alert('Task description is required'); return; }

    const taskId = document.getElementById('task-form-inner').getAttribute('data-task-id');
    const newStatus = document.getElementById('t-status').value || 'Not Started';

    const payload = {
      Title: title,
      Description: desc,
      AssignedTo: document.getElementById('t-assignee').value || 'Unassigned',
      Priority: document.getElementById('t-priority').value || 'Medium',
      Status: newStatus,
      DueDate: document.getElementById('t-due').value || ''
    };

    // PART 3 — Preserve existing timestamps from state
    if (taskId) {
      const t = State.tasks.find(x => x.TaskID === taskId);
      if (t) {
        payload.InProgressDate = t.InProgressDate || '';
        payload.CompletedDate = t.CompletedDate || '';
      }
    }

    const saveBtn = document.querySelector('.modal-footer .btn-primary');
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving…'; }

    try {
      if (taskId) {
        payload.TaskID = taskId;
        await callServer('updateTaskDetails', payload);
        const i = State.tasks.findIndex(x => x.TaskID === taskId);
        if (i >= 0) {
          State.tasks[i] = { ...State.tasks[i], ...payload };
          if (payload.CompletedDate) State.tasks[i].CompletedDate = payload.CompletedDate;
          if (payload.InProgressDate) State.tasks[i].InProgressDate = payload.InProgressDate;
        }
      } else {
        const newId = await callServer('addTask', payload);
        payload.TaskID = newId;
        State.tasks.push(payload);
      }
      // Refresh stats
      const [stats, chartData] = await Promise.all([
        callServer('getDashboardStats'),
        callServer('getChartData')
      ]);
      State.stats = stats || State.stats;
      State.chartData = chartData || State.chartData;

      closeModal();
      setView(State.activeView);
    } catch (err) {
      alert('Save failed: ' + (err.message || err));
    } finally {
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save Task'; }
    }
  }

  // ======================================================
  //  THEME + SIDEBAR TOGGLE
  // ======================================================
  function toggleTheme() {
    const root = document.documentElement;
    const current = root.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('wf-theme', next);
    updateThemeIcon(next);

    // Sync mobile icon
    const mobIcon = document.getElementById('mob-theme-icon');
    if (mobIcon) {
      mobIcon.innerHTML = next === 'light'
        ? '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>'
        : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    }

    if (State.activeView === 'reports' || State.activeView === 'dashboard') {
      destroyCharts();
      setTimeout(() => setView(State.activeView), 100);
    }
  }

  function updateThemeIcon(theme) {
    const icon = document.getElementById('theme-icon');
    if (!icon) return;
    if (theme === 'light') {
      icon.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>';
    } else {
      icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    }
  }

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebar-backdrop');
    const isOpen = sidebar.classList.toggle('open');
    if (backdrop) {
      backdrop.classList.toggle('visible', isOpen);
    }
  }

  function toggleSidebarDesktop() {
    const sidebar = document.getElementById('sidebar');
    if (sidebar) sidebar.classList.toggle('collapsed');
  }

  function toggleMobileMenu() {
    const nav = document.getElementById('mob-dropdown-nav');
    if (nav) nav.classList.toggle('open');
  }

  function closeSidebar() {
    const sidebar = document.getElementById('sidebar');
    if (sidebar) sidebar.classList.remove('open');
    const backdrop = document.getElementById('sidebar-backdrop');
    if (backdrop) backdrop.classList.remove('visible');
    const mobNav = document.getElementById('mob-dropdown-nav');
    if (mobNav) mobNav.classList.remove('open');
  }

  // ======================================================
  //  KEYBOARD SHORTCUTS
  // ======================================================
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.ctrlKey && e.key === 'n') { e.preventDefault(); openModal(); }
  });

  //  EMPLOYEE MANAGEMENT
  // ======================================================


  // ======================================================
  //  AUTHENTICATION LOGIC
  // ======================================================
  /* Signup removed per requirements */

  async function handleLogin() {
    const email = document.getElementById('l-user').value.trim();
    const pass = document.getElementById('l-pass').value;
    if (!email || !pass) { alert('Please enter both email and password'); return; }

    const btn = document.querySelector('#login-form .btn-primary');
    if (btn) { btn.disabled = true; btn.textContent = 'Authenticating...'; }

    try {
      const userData = await callServer('login', email, pass);
      State.user = userData;
      localStorage.setItem('wf-session', JSON.stringify(userData));
      await proceedToDashboard();
    } catch (err) {
      alert('Login Failed: ' + err.message);
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = 'Login to Dashboard'; }
    }
  }

  function handleLogout() {
    localStorage.removeItem('wf-session');
    State.user = null;
    try {
      showAuthScreen(); // Clear UI immediately
    } catch (e) { }
    location.reload(); // Hard reset
  }

  async function proceedToDashboard() {
    try {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('sidebar').style.display = 'flex';

      const user = State.user;
      document.getElementById('user-display-name').textContent = user.displayName;
      document.getElementById('user-display-role').textContent = user.role || 'Workflow Pro';
      
      const avatar = document.getElementById('user-avatar');
      if (avatar) {
        avatar.textContent = getInitials(user.displayName);
        avatar.style.background = getAvatarColor(user.displayName);
      }

      const mobAvatar = document.getElementById('mob-avatar');
      if (mobAvatar) {
        mobAvatar.textContent = getInitials(user.displayName);
        mobAvatar.style.background = getAvatarColor(user.displayName);
      }

      syncMobileChrome();
      await refreshData();
      setView('dashboard');
    } catch (err) {
      console.error('Proceed Error:', err);
      setView('dashboard');
    }
  }

  // ======================================================
  //  BOOT
  // ======================================================
  window.addEventListener('load', init);

  // Global error handler
  window.addEventListener('unhandledrejection', e => {
    console.error('Unhandled Promise Rejection:', e.reason);
  });
</script>
