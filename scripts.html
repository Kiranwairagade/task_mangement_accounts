<script>
'use strict';

// ======================================================
//  WORKFLOW PRO — MASTER SCRIPT v4.0
//  Full 24-column Task schema + Employee Master
//  Advanced Chart.js Analytics + Glassmorphism UI
// ======================================================

/* ── CONSTANTS ── */
const STATUS_MAP = {
  'Not Started':  { action: 'Plan',     color: '#64748b', bg: 'rgba(100,116,139,0.15)', css: 'status-not-started' },
  'In Progress':  { action: 'Execute',  color: '#3b82f6', bg: 'rgba(59,130,246,0.15)',  css: 'status-in-progress' },
  'Review':       { action: 'Review',   color: '#f59e0b', bg: 'rgba(245,158,11,0.15)',  css: 'status-review'      },
  'On Hold':      { action: 'Wait',     color: '#8b5cf6', bg: 'rgba(139,92,246,0.15)',  css: 'status-on-hold'     },
  'Blocked':      { action: 'Escalate', color: '#ef4444', bg: 'rgba(239,68,68,0.15)',   css: 'status-blocked'     },
  'Completed':    { action: 'Close',    color: '#10b981', bg: 'rgba(16,185,129,0.15)',  css: 'status-completed'   },
  'Cancelled':    { action: 'Cancel',   color: '#6b7280', bg: 'rgba(107,114,128,0.15)', css: 'status-cancelled'  }
};

const PRIORITY_MAP = {
  'Critical': { color: '#dc2626', css: 'priority-critical', order: 0 },
  'High':     { color: '#ef4444', css: 'priority-high',     order: 1 },
  'Medium':   { color: '#f59e0b', css: 'priority-medium',   order: 2 },
  'Low':      { color: '#10b981', css: 'priority-low',      order: 3 }
};

const KANBAN_COLS = ['Not Started', 'In Progress', 'Review', 'Blocked', 'Completed'];

const AVATAR_COLORS = ['#6366f1','#14b8a6','#f59e0b','#ef4444','#8b5cf6','#3b82f6','#10b981','#ec4899'];

/* ── STATE ── */
const State = {
  tasks: [],
  employees: [],
  stats: {},
  chartData: {},
  activeView: 'dashboard',
  activeSubView: 'employee',
  chartInstances: [],
  isLoading: false
};

/* ── SERVER BRIDGE ── */
function callServer(method, p1, p2) {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(res => {
        if (res && res.success) resolve(res.data);
        else reject(new Error(res ? res.error : 'Unknown error'));
      })
      .withFailureHandler(err => reject(err))
      .api(method, p1, p2);
  });
}

/* ── HELPERS ── */
function formatDate(raw) {
  if (!raw) return '—';
  try {
    const d = new Date(raw);
    if (isNaN(d.getTime())) return '—';
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  } catch { return '—'; }
}

function formatISO(raw) {
  if (!raw) return '';
  try {
    const d = new Date(raw);
    if (isNaN(d.getTime())) return '';
    return d.toISOString().split('T')[0];
  } catch { return ''; }
}

function getInitials(name) {
  if (!name) return '??';
  return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
}

function getAvatarColor(name) {
  if (!name) return AVATAR_COLORS[0];
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
}

function statusBadge(status) {
  const s = STATUS_MAP[status] || STATUS_MAP['Not Started'];
  return `<span class="badge ${s.css}">${status || '—'}</span>`;
}

function priorityBadge(priority) {
  const p = PRIORITY_MAP[priority];
  if (!p) return `<span class="badge">${priority || '—'}</span>`;
  return `<span class="badge ${p.css}">${priority}</span>`;
}

function progressBar(pct, color) {
  const val = Math.min(100, Math.max(0, parseFloat(pct) || 0));
  const col = color || (val >= 80 ? '#10b981' : val >= 50 ? '#f59e0b' : '#3b82f6');
  return `
    <div style="display:flex; align-items:center; gap:0.5rem;">
      <div class="progress-bar" style="flex:1; width:80px;">
        <div class="progress-fill" style="width:${val}%; background:${col};"></div>
      </div>
      <span class="text-xs text-muted">${val}%</span>
    </div>`;
}

function roundNum(n) { return Math.round((parseFloat(n) || 0) * 10) / 10; }

/* ── DATA LOADING ── */
async function refreshData() {
  try {
    const [tasks, employees, stats, chartData] = await Promise.all([
      callServer('getRecords', 'DB_Tasks'),
      callServer('getRecords', 'DB_Employees'),
      callServer('getDashboardStats'),
      callServer('getChartData')
    ]);
    State.tasks = tasks || [];
    State.employees = employees || [];
    State.stats = stats || {};
    State.chartData = chartData || {};
  } catch (err) {
    console.error('Data load error:', err);
    throw err;
  }
}

/* ── INIT ── */
async function init() {
  // Apply saved theme
  const saved = localStorage.getItem('wf-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  updateThemeIcon(saved);

  document.getElementById('content').innerHTML = `
    <div class="loading-overlay">
      <div class="loader"></div>
      <p style="font-weight:600;">Loading workspace…</p>
      <p class="text-xs text-muted">Fetching data from Google Sheets</p>
    </div>`;

  try {
    await refreshData();
    setView('dashboard');
  } catch (err) {
    document.getElementById('content').innerHTML = `
      <div class="loading-overlay">
        <div style="color:var(--danger); font-size:2rem;">⚠️</div>
        <p style="font-weight:700; color:var(--danger);">Data Load Failed</p>
        <p class="text-sm text-muted">${err.message || err}</p>
        <button class="btn btn-primary" onclick="init()">Retry</button>
      </div>`;
  }
}

/* ── ROUTER ── */
function setView(view) {
  State.activeView = view;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const navBtn = document.getElementById(`nav-${view}`);
  if (navBtn) navBtn.classList.add('active');

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');

  destroyCharts();

  if (view === 'dashboard')  renderDashboard();
  if (view === 'tasks')      renderTasks();
  if (view === 'kanban')     renderKanban();
  if (view === 'reports')    renderReports();
  if (view === 'employees')  renderEmployees();
}

/* ── DESTROY ALL CHARTS ── */
function destroyCharts() {
  State.chartInstances.forEach(c => { try { c.destroy(); } catch(e) {} });
  State.chartInstances = [];
}

/* ── CHART DEFAULTS ── */
function chartDefaults() {
  const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
  Chart.defaults.color = isDark ? '#7b8db8' : '#64748b';
  Chart.defaults.font.family = "'Inter', system-ui, sans-serif";
  Chart.defaults.font.size = 12;
  Chart.defaults.borderColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)';
}

function safeChart(id, config) {
  const el = document.getElementById(id);
  if (!el) return;
  try {
    chartDefaults();
    const instance = new Chart(el.getContext('2d'), config);
    State.chartInstances.push(instance);
  } catch(e) { console.warn('Chart error', id, e); }
}

// ======================================================
//  DASHBOARD VIEW
// ======================================================
function renderDashboard() {
  const main = document.getElementById('content');
  const s = State.stats;
  const openTasks = (s.total || 0) - (s.completed || 0);
  const hrsVar = roundNum((s.estTotalHours || 0) - (s.actualTotalHours || 0));

  // 12-month trend
  const monthMap = {};
  const now = new Date();
  for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - 11 + i, 1);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    monthMap[k] = { due: 0, comp: 0, actHrs: 0 };
  }
  State.tasks.forEach(t => {
    if (!t.DueDate) return;
    const d = new Date(t.DueDate);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if (monthMap[k]) {
      monthMap[k].due++;
      if (t.Status === 'Completed') monthMap[k].comp++;
      monthMap[k].actHrs += roundNum(t.ActualHours);
    }
  });

  // Status counts including On Hold & Cancelled
  const stsOrder = ['Not Started','In Progress','Review','On Hold','Blocked','Completed','Cancelled'];
  const stsCount = {};
  stsOrder.forEach(s => stsCount[s] = 0);
  State.tasks.forEach(t => { if (stsCount[t.Status] !== undefined) stsCount[t.Status]++; });

  // Employee workload
  const empWork = {};
  State.employees.forEach(e => empWork[e.Name] = { tasks: 0, actHrs: 0, overdue: 0, comp: 0 });
  State.tasks.forEach(t => {
    if (empWork[t.AssignedTo]) {
      empWork[t.AssignedTo].tasks++;
      empWork[t.AssignedTo].actHrs += roundNum(t.ActualHours);
      if (t.OverdueFlag === 'Yes') empWork[t.AssignedTo].overdue++;
      if (t.Status === 'Completed') empWork[t.AssignedTo].comp++;
    }
  });

  const kpiCards = [
    { label: 'Total Tasks',    value: s.total || 0,                 sub: 'All tracked tasks',         color: '#6366f1', icon: '📋' },
    { label: 'Open Tasks',     value: openTasks,                    sub: `${s.completionRate||0}% complete`, color: '#3b82f6', icon: '🔄' },
    { label: 'Completed',      value: s.completed || 0,             sub: 'Successfully delivered',    color: '#10b981', icon: '✅' },
    { label: 'Overdue',        value: s.overdue || 0,               sub: 'Need immediate attention',   color: '#ef4444', icon: '⚠️' },
    { label: 'Est. Hours',     value: roundNum(s.estTotalHours),    sub: 'Total planned effort',      color: '#8b5cf6', icon: '⏱️' },
    { label: 'Actual Hours',   value: roundNum(s.actualTotalHours), sub: 'Hours logged to date',      color: '#14b8a6', icon: '⏰' },
    { label: 'Hrs Variance',   value: hrsVar,                       sub: hrsVar >= 0 ? 'Under budget' : 'Over budget', color: hrsVar >= 0 ? '#10b981' : '#ef4444', icon: hrsVar >= 0 ? '📉' : '📈' },
    { label: 'Completion Rate',value: `${s.completionRate || 0}%`,  sub: 'Tasks closed vs total',     color: '#f59e0b', icon: '🎯' }
  ];

  const monthKeys = Object.keys(monthMap).sort();

  main.innerHTML = `
    <div class="page-header">
      <div class="page-title-group">
        <h1>Dashboard</h1>
        <p>Project delivery overview — all teams, all time</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-secondary btn-sm" onclick="refreshData().then(renderDashboard)">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Refresh
        </button>
        <button class="btn btn-primary btn-sm" onclick="openModal()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Task
        </button>
      </div>
    </div>

    <!-- 8 KPI Cards -->
    <div class="kpi-grid">
      ${kpiCards.map(k => `
        <div class="kpi-card">
          <div class="kpi-icon" style="background:${k.color}1a; border:1px solid ${k.color}30;">
            <span style="font-size:1.1rem">${k.icon}</span>
          </div>
          <div class="kpi-label">${k.label}</div>
          <div class="kpi-value" style="color:${k.color}">${k.value}</div>
          <div class="kpi-sub">${k.sub}</div>
        </div>
      `).join('')}
    </div>

    <!-- Charts Row -->
    <div class="charts-grid" style="grid-template-columns: 2fr 1fr;">
      <div class="chart-card">
        <div class="chart-title">12-Month Productivity Trend</div>
        <div class="chart-subtitle">Tasks due vs completed monthly</div>
        <div class="chart-canvas-wrap"><canvas id="dashTrendChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Status Distribution</div>
        <div class="chart-subtitle">Current task breakdown</div>
        <div class="chart-canvas-wrap"><canvas id="dashStatusChart"></canvas></div>
      </div>
    </div>

    <!-- Dashboard Bottom Tables -->
    <div class="triple-grid">
      <!-- 12-Month Data Table -->
      <div class="table-card">
        <div class="section-card-header">
          <div>
            <div class="section-title">📅 12-Month Trend</div>
          </div>
        </div>
        <div class="data-table-wrap">
          <table>
            <thead><tr><th>Month</th><th>Due</th><th>Done</th><th>Hrs</th></tr></thead>
            <tbody>
              ${monthKeys.map(k => `<tr>
                <td class="cell-primary cell-mono">${k}</td>
                <td>${monthMap[k].due}</td>
                <td><span style="color:${monthMap[k].comp>0?'var(--success)':'var(--text-muted)'};">${monthMap[k].comp}</span></td>
                <td>${monthMap[k].actHrs}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- Status Summary -->
      <div class="table-card">
        <div class="section-card-header">
          <div class="section-title">📊 Status Summary</div>
        </div>
        <div class="data-table-wrap">
          <table>
            <thead><tr><th>Status</th><th>Action</th><th>Count</th></tr></thead>
            <tbody>
              ${stsOrder.map(k => `<tr>
                <td>${statusBadge(k)}</td>
                <td class="text-xs text-muted">${STATUS_MAP[k]?.action||'—'}</td>
                <td class="cell-primary">${stsCount[k]}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- Employee Workload -->
      <div class="table-card">
        <div class="section-card-header">
          <div class="section-title">👥 Employee Workload</div>
        </div>
        <div class="data-table-wrap">
          <table>
            <thead><tr><th>Employee</th><th>Tasks</th><th>Hrs</th><th>⚠️</th></tr></thead>
            <tbody>
              ${Object.keys(empWork).map(n => `<tr>
                <td>
                  <div style="display:flex;align-items:center;gap:0.5rem;">
                    <div style="width:26px;height:26px;border-radius:50%;background:${getAvatarColor(n)};display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;color:white;flex-shrink:0;">${getInitials(n)}</div>
                    <span class="cell-primary" style="font-size:0.8rem;">${n}</span>
                  </div>
                </td>
                <td>${empWork[n].tasks}</td>
                <td>${empWork[n].actHrs}</td>
                <td><span style="color:${empWork[n].overdue>0?'var(--danger)':'var(--text-muted)'};">${empWork[n].overdue}</span></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  // Draw charts after render
  setTimeout(() => {
    const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
    const gridColor = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)';

    safeChart('dashTrendChart', {
      type: 'line',
      data: {
        labels: monthKeys,
        datasets: [
          { label: 'Tasks Due', data: monthKeys.map(k => monthMap[k].due),
            borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,0.12)',
            fill: true, tension: 0.4, pointRadius: 4, pointHoverRadius: 6 },
          { label: 'Completed', data: monthKeys.map(k => monthMap[k].comp),
            borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.08)',
            fill: true, tension: 0.4, pointRadius: 4, pointHoverRadius: 6 }
        ]
      },
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top' } },
        scales: { x: { grid: { color: gridColor } }, y: { beginAtZero: true, grid: { color: gridColor } } } }
    });

    safeChart('dashStatusChart', {
      type: 'doughnut',
      data: {
        labels: stsOrder.filter(k => stsCount[k] > 0),
        datasets: [{ data: stsOrder.filter(k => stsCount[k] > 0).map(k => stsCount[k]),
          backgroundColor: stsOrder.filter(k => stsCount[k] > 0).map(k => STATUS_MAP[k]?.color || '#64748b'),
          borderWidth: 2, borderColor: isDark ? '#0d1420' : '#f8fafc', hoverOffset: 6 }]
      },
      options: { responsive: true, maintainAspectRatio: false, cutout: '65%',
        plugins: { legend: { position: 'bottom', labels: { padding: 12, usePointStyle: true } } } }
    });
  }, 60);
}

// ======================================================
//  TASK TRACKER VIEW
// ======================================================
function renderTasks() {
  const main = document.getElementById('content');
  const filterText   = (document.getElementById('t-search')?.value || '').toLowerCase();
  const filterStatus = document.getElementById('t-status-filter')?.value || 'All';
  const filterPrio   = document.getElementById('t-prio-filter')?.value || 'All';

  const filtered = State.tasks.filter(t => {
    const matchText = !filterText ||
      (t.Title||'').toLowerCase().includes(filterText) ||
      (t.TaskID||'').toLowerCase().includes(filterText) ||
      (t.AssignedTo||'').toLowerCase().includes(filterText) ||
      (t.Project||'').toLowerCase().includes(filterText);
    const matchStatus = filterStatus === 'All' || t.Status === filterStatus;
    const matchPrio   = filterPrio === 'All' || t.Priority === filterPrio;
    return matchText && matchStatus && matchPrio;
  });

  main.innerHTML = `
    <div class="page-header">
      <div class="page-title-group">
        <h1>Task Tracker</h1>
        <p>${filtered.length} of ${State.tasks.length} tasks</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary btn-sm" onclick="openModal()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Task
        </button>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <div class="table-title">All Tasks</div>
        <div class="table-filters">
          <input type="text" id="t-search" class="input-glass" placeholder="🔍 Search tasks, IDs, assignees…" value="${filterText}" onkeyup="renderTasks()" style="min-width:220px;">
          <select id="t-status-filter" class="input-glass" onchange="renderTasks()">
            <option value="All">All Statuses</option>
            ${Object.keys(STATUS_MAP).map(s => `<option value="${s}" ${filterStatus===s?'selected':''}>${s}</option>`).join('')}
          </select>
          <select id="t-prio-filter" class="input-glass" onchange="renderTasks()">
            <option value="All">All Priorities</option>
            ${Object.keys(PRIORITY_MAP).map(p => `<option value="${p}" ${filterPrio===p?'selected':''}>${p}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="data-table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Title</th><th>Project</th><th>Category</th>
              <th>Assignee</th><th>Priority</th><th>Status</th><th>Action</th>
              <th>Progress</th><th>Est Hrs</th><th>Act Hrs</th><th>Variance</th>
              <th>Source</th><th>Due Date</th><th>Manager</th>
            </tr>
          </thead>
          <tbody>
            ${filtered.map(t => {
              const isOd = t.OverdueFlag === 'Yes';
              return `<tr class="${isOd?'row-overdue':''}" onclick="openModal('${t.TaskID}')" style="cursor:pointer;">
                <td class="cell-mono text-xs text-muted">${t.TaskID}</td>
                <td class="cell-primary" style="max-width:180px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.Title}</td>
                <td class="text-xs">${t.Project||'—'}</td>
                <td class="text-xs">${t.Category||'—'}</td>
                <td>
                  <div style="display:flex;align-items:center;gap:0.4rem;">
                    <div style="width:24px;height:24px;border-radius:50%;background:${getAvatarColor(t.AssignedTo)};display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:800;color:white;flex-shrink:0;">${getInitials(t.AssignedTo)}</div>
                    <span class="text-xs">${t.AssignedTo||'—'}</span>
                  </div>
                </td>
                <td>${priorityBadge(t.Priority)}</td>
                <td>${statusBadge(t.Status)}</td>
                <td class="text-xs text-muted">${STATUS_MAP[t.Status]?.action || t.ActionType || '—'}</td>
                <td style="min-width:120px;">${progressBar(t.ProgressPercent)}</td>
                <td class="text-xs">${roundNum(t.EstHours)}</td>
                <td class="text-xs">${roundNum(t.ActualHours)}</td>
                <td class="text-xs ${roundNum(t.HoursVariance)<0?'text-danger':'text-success'}">${t.HoursVariance !== '' && t.HoursVariance !== undefined && t.HoursVariance !== null ? roundNum(t.HoursVariance) : '—'}</td>
                <td class="text-xs">${t.Source||'—'}</td>
                <td class="text-xs ${isOd?'text-danger':''}">${formatDate(t.DueDate)}</td>
                <td class="text-xs">${t.Manager||'—'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;

  const el = document.getElementById('t-search');
  if (el && filterText) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
}

// ======================================================
//  KANBAN BOARD VIEW
// ======================================================
function renderKanban() {
  const main = document.getElementById('content');
  const filterText = (document.getElementById('k-search')?.value || '').toLowerCase();
  const filterPrio  = document.getElementById('k-prio-filter')?.value || 'All';

  const grouped = {};
  KANBAN_COLS.forEach(c => grouped[c] = []);
  State.tasks.forEach(t => {
    const matchText = !filterText ||
      (t.Title||'').toLowerCase().includes(filterText) ||
      (t.AssignedTo||'').toLowerCase().includes(filterText) ||
      (t.TaskID||'').toLowerCase().includes(filterText);
    const matchPrio = filterPrio === 'All' || t.Priority === filterPrio;
    if (!matchText || !matchPrio) return;

    if (grouped[t.Status]) grouped[t.Status].push(t);
    else grouped['Not Started'].push(t);
  });

  // Build team avatar stack from distinct assignees (up to 6)
  const assignees = [...new Set(State.tasks.map(t => t.AssignedTo).filter(Boolean))].slice(0, 6);
  const avatarStack = assignees.map(name => `
    <div class="k-avatar" title="${name}"
         style="background:${getAvatarColor(name)}"
         onclick="document.getElementById('k-search').value='${name}'; renderKanban();">
      ${getInitials(name)}
    </div>`).join('');

  // Priority icon class helper
  function priorityIconClass(p) {
    if (p === 'Critical') return 'kp-critical';
    if (p === 'High')     return 'kp-high';

            </svg>
            <span class="kanban-card-id">${t.TaskID}</span>
          </div>
          <div class="kanban-card-actions">
            <button class="kanban-card-menu" onclick="event.stopPropagation(); openModal('${t.TaskID}')" title="Options">···</button>
            <div class="kanban-priority-lines ${priorityIconClass(t.Priority || 'Medium')}" title="Priority: ${t.Priority || 'Medium'}">

    return `

           ondragover="allowDrop(event)" ondrop="handleDrop(event)" ondragleave="handleDragLeave(event)">
        <div class="kanban-col-header">

  }).join('');

  main.innerHTML = `

  const el = document.getElementById('k-search');

}

let _dragId = null;
function handleDragStart(e, id) {
  _dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.target.classList.add('dragging');
}
function allowDrop(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.closest('.kanban-col')?.classList.add('drag-over');
}
function handleDragLeave(e) {
  e.currentTarget.closest('.kanban-col')?.classList.remove('drag-over');
}
async function handleDrop(e) {
  e.preventDefault();
  document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over'));
  const id = _dragId || e.dataTransfer.getData('text/plain');
  const col = e.currentTarget.closest('.kanban-col');
  if (!col || !id) return;
  const newStatus = col.getAttribute('data-status');
  const t = State.tasks.find(x => x.TaskID === id);
  if (!t || t.Status === newStatus) return;
  t.Status = newStatus;
  t.ActionType = STATUS_MAP[newStatus]?.action || '';
  if (newStatus === 'Completed') { t.ProgressPercent = 100; t.CompletedDate = new Date().toISOString(); }
  renderKanban();
  try { await callServer('updateTaskStatus', id, newStatus); }
  catch(err) { console.warn('Status sync failed:', err); }
}
document.addEventListener('dragend', e => {
  document.querySelectorAll('.kanban-card').forEach(c => c.classList.remove('dragging'));
  _dragId = null;
});

/* ── MONTHLY REPORT ── */
function buildMonthlyReport() {
  const allMonthKeys = [...new Set(State.tasks
    .filter(t => t.DueDate)
    .map(t => { const d = new Date(t.DueDate); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; })
  )].sort().reverse();

  const selMo = document.getElementById('r-mo-sel')?.value || (allMonthKeys[0] || '');
  const monthStart = selMo ? new Date(selMo + '-01') : new Date();

  let due=0, comp=0, cfOpen=0, actH=0;
  const empStats = {};
  State.employees.forEach(e => empStats[e.Name] = { dept: e.Department, due:0, comp:0, open:0, cf:0, estH:0, actH:0 });

  State.tasks.forEach(t => {
    if (!t.DueDate) return;
    const d = new Date(t.DueDate);
    const tKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const ongoing = t.Status !== 'Completed' && t.Status !== 'Cancelled';

    if (tKey === selMo) {
      due++;
      if (t.Status === 'Completed') comp++;
      else if (empStats[t.AssignedTo]) empStats[t.AssignedTo].open++;
      actH += roundNum(t.ActualHours);
      if (empStats[t.AssignedTo]) {
        empStats[t.AssignedTo].due++;
        if (t.Status === 'Completed') empStats[t.AssignedTo].comp++;
        empStats[t.AssignedTo].actH += roundNum(t.ActualHours);
        empStats[t.AssignedTo].estH += roundNum(t.EstHours);
      }
    } else if (d < monthStart && ongoing) {
      cfOpen++;
      if (empStats[t.AssignedTo]) empStats[t.AssignedTo].cf++;
    }
  });

  return `
    <div class="section-card" style="margin-bottom:1.5rem;">
      <div class="section-card-header">
        <div style="font-weight:700;">📅 Monthly Report — ${selMo||'—'}</div>
        <select id="r-mo-sel" class="input-glass" onchange="renderReports()">
          ${allMonthKeys.map(k => `<option value="${k}" ${k===selMo?'selected':''}>${k}</option>`).join('')}
        </select>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem;margin-bottom:1.5rem;">
      <div class="kpi-card"><div class="kpi-label">Tasks Due</div><div class="kpi-value" style="color:#6366f1;">${due}</div></div>
      <div class="kpi-card"><div class="kpi-label">Completed</div><div class="kpi-value" style="color:#10b981;">${comp}</div></div>
      <div class="kpi-card"><div class="kpi-label">Carry Forward</div><div class="kpi-value" style="color:#ef4444;">${cfOpen}</div></div>
      <div class="kpi-card"><div class="kpi-label">Actual Hours</div><div class="kpi-value" style="color:#14b8a6;">${actH.toFixed(1)}</div></div>
    </div>

    <div class="charts-grid" style="grid-template-columns:2fr 1fr;margin-bottom:1.5rem;">
      <div class="chart-card">
        <div class="chart-title">Monthly Trend — All Time</div>
        <div class="chart-subtitle">Tasks due vs completed across months</div>
        <div class="chart-canvas-wrap-tall"><canvas id="monthTrendLine"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">This Month KPIs</div>
        <div class="chart-subtitle">Bucket completion ratio</div>
        <div class="chart-canvas-wrap-tall"><canvas id="monthBucketBar"></canvas></div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header"><div class="table-title">Employee Summary — ${selMo}</div></div>
      <div class="data-table-wrap">
        <table>
          <thead><tr><th>Employee</th><th>Department</th><th>Tasks Due</th><th>Completed</th><th>Open</th><th>Carry Fwd</th><th>Est Hrs</th><th>Act Hrs</th><th>Completion %</th></tr></thead>
          <tbody>
            ${Object.keys(empStats).map(n => {
              const e = empStats[n];
              const pct = e.due > 0 ? Math.round((e.comp/e.due)*100) : 0;
              return `<tr>
                <td class="cell-primary text-xs">${n}</td>
                <td class="text-xs">${e.dept||'—'}</td>
                <td class="text-xs">${e.due}</td>
                <td class="text-xs" style="color:var(--success);">${e.comp}</td>
                <td class="text-xs">${e.open}</td>
                <td class="text-xs" style="color:${e.cf>0?'var(--danger)':'var(--text-muted)'};">${e.cf}</td>
                <td class="text-xs">${e.estH.toFixed(1)}</td>
                <td class="text-xs">${e.actH.toFixed(1)}</td>
                <td style="min-width:130px;">${progressBar(pct, pct>=80?'#10b981':'#f59e0b')}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

/* ── CHART RENDERER FOR REPORTS ── */
function drawReportCharts() {
  const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
  const gridColor = isDark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)';
  chartDefaults();

  const sub = State.activeSubView;

  if (sub === 'employee') {
    const selEmp = document.getElementById('r-emp-sel')?.value || '';
    const empTasks = State.tasks.filter(t => t.AssignedTo === selEmp);
    const stsOrder2 = Object.keys(STATUS_MAP);
    const stsCounts = stsOrder2.map(s => empTasks.filter(t => t.Status === s).length);

    safeChart('empStatusBar', {
      type: 'bar',
      data: { labels: stsOrder2,
        datasets: [{ label: 'Tasks', data: stsCounts,
          backgroundColor: stsOrder2.map(s => STATUS_MAP[s].color + '99'),
          borderColor: stsOrder2.map(s => STATUS_MAP[s].color),
          borderWidth: 2, borderRadius: 6 }] },
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { grid: { display: false } }, y: { beginAtZero: true, grid: { color: gridColor }, ticks: { stepSize: 1 } } } }
    });

    const actH = empTasks.reduce((s,t)=>s+roundNum(t.ActualHours),0);
    const estH = empTasks.reduce((s,t)=>s+roundNum(t.EstHours),0);
    safeChart('empEffortDoughnut', {
      type: 'doughnut',
      data: { labels: ['Actual Hours', 'Remaining Est.'],
        datasets: [{ data: [actH, Math.max(0, estH - actH)],
          backgroundColor: ['#6366f1bb', 'rgba(255,255,255,0.06)'],
          borderColor: ['#6366f1', isDark ? '#1e293b' : '#f8fafc'],
          borderWidth: 2 }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: '70%',
        plugins: { legend: { position: 'bottom' } } }
    });
  }

  if (sub === 'monthly') {
    const allMoKeys = [...new Set(State.tasks.filter(t=>t.DueDate).map(t => {
      const d = new Date(t.DueDate);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    }))].sort();
    const moData = {};
    allMoKeys.forEach(k => moData[k] = { due:0, comp:0, cf:0 });
    State.tasks.forEach(t => {
      if (!t.DueDate) return;
      const d = new Date(t.DueDate);
      const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (moData[k]) {
        moData[k].due++;
        if (t.Status === 'Completed') moData[k].comp++;
      }
    });

    safeChart('monthTrendLine', {
      type: 'line',
      data: { labels: allMoKeys,
        datasets: [
          { label: 'Tasks Due', data: allMoKeys.map(k=>moData[k].due),
            borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,0.1)',
            fill: true, tension: 0.4, pointRadius: 4 },
          { label: 'Completed', data: allMoKeys.map(k=>moData[k].comp),
            borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.08)',
            fill: true, tension: 0.4, pointRadius: 4 }
        ] },
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top' } },
        scales: { x: { grid: { color: gridColor } }, y: { beginAtZero: true, grid: { color: gridColor } } } }
    });

    const selMo = document.getElementById('r-mo-sel')?.value || '';
    let due=0, comp=0, open=0;
    State.tasks.forEach(t => {
      if (!t.DueDate) return;
      const d = new Date(t.DueDate);
      const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (k === selMo) {
        due++;
        if (t.Status === 'Completed') comp++;
        else open++;
      }
    });
    safeChart('monthBucketBar', {
      type: 'bar',
      data: { labels: ['Due', 'Completed', 'Open'],
        datasets: [{ data: [due, comp, open],
          backgroundColor: ['#6366f188','#10b98188','#ef444488'],
          borderColor: ['#6366f1','#10b981','#ef4444'],
          borderWidth: 2, borderRadius: 8 }] },
      options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: { x: { beginAtZero: true, grid: { color: gridColor } }, y: { grid: { display: false } } } }
    });
  }

  if (sub === 'manager') {
    const selMgr = document.getElementById('r-mgr-sel')?.value || '';
    const team = State.employees.filter(e => e.Manager === selMgr).map(e => e.Name);
    const mgrTasks = State.tasks.filter(t => team.includes(t.AssignedTo) || t.Manager === selMgr);

    safeChart('mgrTeamBar', {
      type: 'bar',
      data: { labels: team,
        datasets: [
          { label: 'Est Hrs', data: team.map(n => mgrTasks.filter(t=>t.AssignedTo===n).reduce((s,t)=>s+roundNum(t.EstHours),0)),
            backgroundColor: 'rgba(99,102,241,0.5)', borderColor: '#6366f1', borderWidth: 2, borderRadius: 4 },
          { label: 'Actual Hrs', data: team.map(n => mgrTasks.filter(t=>t.AssignedTo===n).reduce((s,t)=>s+roundNum(t.ActualHours),0)),
            backgroundColor: 'rgba(20,184,166,0.5)', borderColor: '#14b8a6', borderWidth: 2, borderRadius: 4 }
        ] },
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top' } },
        scales: { x: { grid: { display: false } }, y: { beginAtZero: true, grid: { color: gridColor } } } }
    });

    const stsOrder = Object.keys(STATUS_MAP);
    const stsCounts = stsOrder.map(s => mgrTasks.filter(t=>t.Status===s).length).filter((v,i,a) => v > 0 || a.some(x=>x>0));
    const stsLabels = stsOrder.filter(s => mgrTasks.some(t=>t.Status===s));
    safeChart('mgrStatusDoughnut', {
      type: 'doughnut',
      data: { labels: stsLabels,
        datasets: [{ data: stsLabels.map(s=>mgrTasks.filter(t=>t.Status===s).length),
          backgroundColor: stsLabels.map(s=>STATUS_MAP[s].color+'bb'),
          borderColor: isDark ? '#0d1420' : '#f8fafc', borderWidth: 2 }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: '60%',
        plugins: { legend: { position: 'bottom', labels: { padding: 10, usePointStyle: true } } } }
    });
  }

  if (sub === 'visual') {
    const stsOrder = Object.keys(STATUS_MAP);
    const stsCounts = stsOrder.map(s => State.tasks.filter(t=>t.Status===s).length);

    safeChart('visStatusDoughnut', {
      type: 'doughnut',
      data: { labels: stsOrder,
        datasets: [{ data: stsCounts,
          backgroundColor: stsOrder.map(s => STATUS_MAP[s].color + 'bb'),
          borderColor: isDark ? '#0d1420' : '#f8fafc', borderWidth: 2, hoverOffset: 8 }] },
      options: { responsive: true, maintainAspectRatio: false, cutout: '60%',
        plugins: { legend: { position: 'right', labels: { padding: 12, usePointStyle: true } } } }
    });

    const prios = Object.keys(PRIORITY_MAP);
    safeChart('visPriorityBar', {
      type: 'bar',
      data: { labels: prios,
        datasets: [{ label: 'Tasks',
          data: prios.map(p => State.tasks.filter(t=>t.Priority===p).length),
          backgroundColor: prios.map(p => PRIORITY_MAP[p].color + '88'),
          borderColor: prios.map(p => PRIORITY_MAP[p].color),
          borderWidth: 2, borderRadius: 8 }] },
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { grid: { display: false } }, y: { beginAtZero: true, grid: { color: gridColor } } } }
    });

    const empNames = State.employees.map(e => e.Name);
    safeChart('visEmpBar', {
      type: 'bar',
      data: { labels: empNames,
        datasets: [
          { label: 'Est Hours', data: empNames.map(n=>State.tasks.filter(t=>t.AssignedTo===n).reduce((s,t)=>s+roundNum(t.EstHours),0)),
            backgroundColor: 'rgba(99,102,241,0.55)', borderColor: '#6366f1', borderWidth: 2, borderRadius: 4 },
          { label: 'Actual Hours', data: empNames.map(n=>State.tasks.filter(t=>t.AssignedTo===n).reduce((s,t)=>s+roundNum(t.ActualHours),0)),
            backgroundColor: 'rgba(20,184,166,0.55)', borderColor: '#14b8a6', borderWidth: 2, borderRadius: 4 }
        ] },
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top' } },
        scales: { x: { grid: { display: false } }, y: { beginAtZero: true, grid: { color: gridColor } } } }
    });

    const cats = [...new Set(State.tasks.map(t=>t.Category).filter(Boolean))];
    safeChart('visCategoryPie', {
      type: 'pie',
      data: { labels: cats,
        datasets: [{ data: cats.map(c => State.tasks.filter(t=>t.Category===c).length),
          backgroundColor: ['#6366f1bb','#14b8a6bb','#f59e0bbb','#ef4444bb','#8b5cf6bb','#3b82f6bb'],
          borderColor: isDark ? '#0d1420' : '#f8fafc', borderWidth: 2 }] },
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'right', labels: { padding: 10, usePointStyle: true } } } }
    });
  }
}

function openModal(taskId = null) {
  const inner = document.getElementById('task-form-inner');
  const overlay = document.getElementById('task-modal');
  inner.setAttribute('data-task-id', taskId || '');

  // Populate assignees + managers
  const sel = document.getElementById('t-assignee');
  const mgSel = document.getElementById('t-manager');
  sel.innerHTML = '<option value="">-- Unassigned --</option>' + State.employees.map(e => `<option value="${e.Name}">${e.Name}</option>`).join('');
  mgSel.innerHTML = '<option value="">-- No Manager --</option>' + State.employees.map(e => `<option value="${e.Name}">${e.Name}</option>`).join('');

  if (taskId) {
    const t = State.tasks.find(x => x.TaskID === taskId);
    document.getElementById('modal-title').textContent = `Edit Task`;
    document.getElementById('modal-subtitle').textContent = `${taskId} · Click Save to update Google Sheets`;
    if (t) {
      document.getElementById('t-title').value    = t.Title || '';
      document.getElementById('t-desc').value     = t.Description || '';
      document.getElementById('t-project').value  = t.Project || '';
      document.getElementById('t-category').value = t.Category || 'Implementation';
      document.getElementById('t-assignee').value = t.AssignedTo || '';
      document.getElementById('t-priority').value = t.Priority || 'Medium';
      document.getElementById('t-status').value   = t.Status || 'Not Started';
      document.getElementById('t-due').value      = formatISO(t.DueDate);
      document.getElementById('t-source').value   = t.Source || '';
      document.getElementById('t-manager').value  = t.Manager || '';
      document.getElementById('t-hours').value    = t.EstHours || '';
      document.getElementById('t-actual').value   = t.ActualHours || '';
      document.getElementById('t-progress').value = t.ProgressPercent || '';
      document.getElementById('t-next').value     = t.NextStep || '';
    }
  } else {
    document.getElementById('modal-title').textContent = 'New Task';
    document.getElementById('modal-subtitle').textContent = 'Only Title and Description are required - fill other details later';
    ['t-title','t-desc','t-project','t-source','t-hours','t-actual','t-progress','t-next','t-due'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = '';
    });
    document.getElementById('t-priority').value = 'Medium';
    document.getElementById('t-status').value   = 'Not Started';
    document.getElementById('t-assignee').value = '';
    document.getElementById('t-manager').value = '';
    document.getElementById('t-category').value = 'Implementation';
  }

  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('task-modal').classList.remove('open');
}

function handleModalOverlayClick(e) {
  if (e.target === document.getElementById('task-modal')) closeModal();
}

async function saveTask() {
  const title = document.getElementById('t-title').value.trim();
  const desc = document.getElementById('t-desc').value.trim();
  
  // Only Title and Description are required
  if (!title) { alert('Task title is required'); return; }
  if (!desc) { alert('Task description is required'); return; }

  const taskId = document.getElementById('task-form-inner').getAttribute('data-task-id');
  const estH   = parseFloat(document.getElementById('t-hours').value) || 0;
  const actH   = parseFloat(document.getElementById('t-actual').value) || 0;
  const newStatus = document.getElementById('t-status').value || 'Not Started';

  const payload = {
    Title:           title,
    Description:     desc,
    Project:         document.getElementById('t-project').value || '',
    Category:        document.getElementById('t-category').value || 'Implementation',
    AssignedTo:      document.getElementById('t-assignee').value || 'Unassigned',
    Priority:        document.getElementById('t-priority').value || 'Medium',
    Status:          newStatus,
    ActionType:      STATUS_MAP[newStatus]?.action || 'Execute',
    DueDate:         document.getElementById('t-due').value || '',
    Source:          document.getElementById('t-source').value || '',
    Manager:         document.getElementById('t-manager').value || '',
    EstHours:        estH,
    ActualHours:     actH,
    HoursVariance:   estH > 0 || actH > 0 ? roundNum(estH - actH) : 0,
    ProgressPercent: parseInt(document.getElementById('t-progress').value) || (newStatus === 'Completed' ? 100 : 0),
    NextStep:        document.getElementById('t-next').value || ''
  };

  if (newStatus === 'Completed' && !taskId) payload.CompletedDate = new Date().toISOString();

  const saveBtn = document.querySelector('.modal-footer .btn-primary');
  if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Saving…'; }

  try {
    if (taskId) {
      payload.TaskID = taskId;
      await callServer('updateTaskDetails', payload);
      const i = State.tasks.findIndex(x => x.TaskID === taskId);
      if (i >= 0) State.tasks[i] = { ...State.tasks[i], ...payload };
    } else {
      const newId = await callServer('addTask', payload);
      payload.TaskID = newId;
      State.tasks.push(payload);
    }
    // Refresh stats
    const [stats, chartData] = await Promise.all([
      callServer('getDashboardStats'),
      callServer('getChartData')
    ]);
    State.stats = stats || State.stats;
    State.chartData = chartData || State.chartData;

    closeModal();
    setView(State.activeView);
  } catch (err) {
    alert('Save failed: ' + (err.message || err));
  } finally {
    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Save Task'; }
  }
}

// ======================================================
//  THEME + SIDEBAR TOGGLE
// ======================================================
function toggleTheme() {
  const root = document.documentElement;
  const current = root.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  localStorage.setItem('wf-theme', next);
  updateThemeIcon(next);
  // Re-draw charts with new colors if on visual sub-view
  if (State.activeView === 'reports' || State.activeView === 'dashboard') {
    destroyCharts();
    setTimeout(() => {
      if (State.activeView === 'dashboard') renderDashboard();
      else drawReportCharts();
    }, 100);
  }
}

function updateThemeIcon(theme) {
  const icon = document.getElementById('theme-icon');
  if (!icon) return;
  if (theme === 'light') {
    icon.innerHTML = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>';
  } else {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  }
}

  document.getElementById('sidebar').classList.toggle('open');
}
